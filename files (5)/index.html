<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Jumper</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; overflow:hidden; height:100vh; background:#07091a; color:#fff; }
#bg-canvas { position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none; }

/* ── MENU SCREEN ── */
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap');

#menu-screen {
  position:relative; z-index:10;
  width:100%; height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

/* ── FLOATING PLANETS ── */
.deco { position:absolute; border-radius:50%; pointer-events:none; }
.deco-moon {
  width:150px; height:150px;
  background:radial-gradient(circle at 38% 35%, #d4f7a0 0%, #a8e060 35%, #78b830 70%, #558010 100%);
  box-shadow: inset -16px -16px 32px rgba(30,60,0,0.4), 0 0 60px rgba(120,184,48,0.3), 0 0 120px rgba(120,184,48,0.12);
  top:4%; left:3%;
  animation: floatA 7s ease-in-out infinite;
}
.deco-moon::before,.deco-moon::after { content:''; position:absolute; border-radius:50%; background:rgba(40,80,0,0.3); }
.deco-moon::before { width:32px;height:26px;top:32px;left:26px; }
.deco-moon::after  { width:20px;height:18px;top:66px;left:72px; }

.deco-saturn {
  width:90px; height:90px;
  background:radial-gradient(circle at 38% 35%, #c8dcff 0%, #8090d8 50%, #384878 100%);
  box-shadow: inset -10px -10px 22px rgba(0,10,60,0.45), 0 0 40px rgba(100,130,220,0.25);
  bottom:10%; right:4%;
  animation: floatB 9s ease-in-out infinite;
}
.deco-saturn::before {
  content:''; position:absolute;
  width:140px; height:28px;
  border:8px solid rgba(180,200,255,0.32);
  border-radius:50%;
  top:50%; left:50%;
  transform:translate(-50%,-50%) rotate(-22deg);
  box-shadow: 0 0 20px rgba(150,180,255,0.2);
}

.deco-red {
  width:52px; height:52px;
  background:radial-gradient(circle at 38% 35%, #ffb880 0%, #e06030 55%, #882010 100%);
  box-shadow: inset -6px -6px 14px rgba(80,10,0,0.4), 0 0 30px rgba(220,80,30,0.2);
  top:15%; right:14%;
  animation: floatC 11s ease-in-out infinite;
}
.deco-red::before { content:''; position:absolute; width:16px;height:10px;top:14px;left:12px;border-radius:50%;background:rgba(255,200,150,0.3); }

.deco-rock1 {
  width:44px; height:38px;
  background:radial-gradient(circle at 40% 38%, #8a7e9a 0%, #5a4e6a 100%);
  border-radius:46% 54% 38% 62% / 55% 45% 55% 45%;
  box-shadow: inset -4px -4px 10px rgba(20,0,40,0.5);
  bottom:20%; left:4%;
  animation: orbitRock 18s linear infinite;
}
.deco-rock2 {
  width:26px; height:24px;
  background:radial-gradient(circle at 40% 38%, #9a8a7a 0%, #6a5a4a 100%);
  border-radius:54% 46% 62% 38% / 45% 55% 45% 55%;
  top:55%; right:10%;
  animation: floatA 8s ease-in-out infinite reverse;
}
.deco-rock3 {
  width:18px; height:16px;
  background:radial-gradient(circle at 40% 38%, #7a8a9a 0%, #3a4a5a 100%);
  border-radius:50% 50% 60% 40%;
  top:35%; left:8%;
  animation: floatC 13s ease-in-out infinite;
}
/* orbiting asteroid around moon */
.deco-orbit {
  width:20px; height:18px;
  background:radial-gradient(circle at 40% 38%, #b0a090 0%, #705040 100%);
  border-radius:50%;
  top:4%; left:3%;
  transform-origin: 160px 160px;
  animation: orbit 12s linear infinite;
}
@keyframes orbit { from{transform:rotate(0deg) translateX(120px) rotate(0deg)} to{transform:rotate(360deg) translateX(120px) rotate(-360deg)} }
@keyframes floatA{0%,100%{transform:translateY(0px) rotate(0deg)}50%{transform:translateY(-22px) rotate(5deg)}}
@keyframes floatB{0%,100%{transform:translateY(0px) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}
@keyframes floatC{0%,100%{transform:translateY(0px) rotate(6deg)}50%{transform:translateY(-12px) rotate(-6deg)}}
@keyframes orbitRock{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(30px,-20px) rotate(90deg)}50%{transform:translate(60px,0px) rotate(180deg)}75%{transform:translate(30px,20px) rotate(270deg)}100%{transform:translate(0,0) rotate(360deg)}}

/* twinkling stars */
.twinkle { position:absolute; border-radius:50%; background:#fff; pointer-events:none; animation:twinkle ease-in-out infinite; }
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.1;transform:scale(0.3)}}

/* ── TITLE ── */
.menu-card { position:relative; z-index:5; text-align:center; width:calc(100% - 32px); max-width:420px; }

.menu-title {
  font-family:'Fredoka One','Arial Black',sans-serif;
  font-size:clamp(52px,11vw,76px);
  line-height:0.9; letter-spacing:3px;
  color:#fff;
  text-shadow: 0 5px 0 #1a3a9a, 0 10px 0 rgba(20,50,150,0.45), 0 0 50px rgba(120,180,255,0.7), 0 0 100px rgba(80,140,255,0.3);
  -webkit-text-stroke: 3px rgba(100,160,255,0.55);
  margin-bottom:36px;
  animation: titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse{0%,100%{text-shadow:0 5px 0 #1a3a9a,0 10px 0 rgba(20,50,150,0.45),0 0 50px rgba(120,180,255,0.7),0 0 100px rgba(80,140,255,0.3)}50%{text-shadow:0 5px 0 #1a3a9a,0 10px 0 rgba(20,50,150,0.45),0 0 80px rgba(120,180,255,0.9),0 0 160px rgba(80,140,255,0.5)}}
.title-line2 { display:block; color:#ffe060; -webkit-text-stroke:3px rgba(200,130,0,0.55); text-shadow:0 5px 0 #a06000,0 10px 0 rgba(160,90,0,0.4),0 0 50px rgba(255,220,60,0.6),0 0 100px rgba(255,180,0,0.3); animation:titlePulse2 3s ease-in-out infinite; }
@keyframes titlePulse2{0%,100%{text-shadow:0 5px 0 #a06000,0 10px 0 rgba(160,90,0,0.4),0 0 50px rgba(255,220,60,0.6),0 0 100px rgba(255,180,0,0.3)}50%{text-shadow:0 5px 0 #a06000,0 10px 0 rgba(160,90,0,0.4),0 0 90px rgba(255,220,60,0.95),0 0 180px rgba(255,180,0,0.5)}}

/* ── WALLET INFO STRIP ── */
#sphere-wallet-info {
  display:none;
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:16px; padding:10px 18px; margin-bottom:16px;
  font-size:13px; font-family:'Nunito',sans-serif;
  backdrop-filter:blur(12px);
}
.wallet-row { display:flex;justify-content:space-between;align-items:center; }
#sphere-address { color:#ffe060; font-weight:700; }
#sphere-balance { color:rgba(255,255,255,0.55); font-size:12px; }
#sphere-disconnect-btn {
  display:none; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:8px; padding:4px 10px; font-size:11px; color:rgba(255,255,255,0.5); cursor:pointer; font-family:'Nunito',sans-serif;
}
#sphere-disconnect-btn:hover { background:rgba(255,255,255,0.2); }
#sphere-connect-btn { display: block; }
#sphere-deposit-btn { display: none; }

/* ── ARCADE BUTTONS ── */
.wallet-section { margin-bottom:0; }
.arcade-btn {
  display:block; width:100%; max-width:280px;
  margin:0 auto 16px;
  padding:16px 24px;
  font-family:'Fredoka One','Arial Black',sans-serif;
  font-size:22px; letter-spacing:2px;
  color:#fff; cursor:pointer; border:none;
  border-radius:16px; position:relative;
  text-shadow:0 2px 4px rgba(0,0,0,0.5);
  animation: btnBounce 1.8s ease-in-out infinite;
}
.arcade-btn:nth-child(2) { animation-delay: 0.3s; }
#demo-btn { animation-delay: 0.6s; }
@keyframes btnBounce {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-6px); }
}
.arcade-btn:hover  { filter:brightness(1.12); animation-play-state:paused; transform:translateY(-4px) scale(1.03); }
.arcade-btn:active { transform:translateY(4px) scale(0.97); filter:brightness(0.88); animation-play-state:paused; }
.arcade-btn:disabled { opacity:0.45; cursor:not-allowed; animation:none; transform:none !important; }

/* gold UCT button */
.arcade-btn-gold {
  background:linear-gradient(180deg,#ffe060 0%,#f0a800 45%,#c87000 100%);
  box-shadow: 0 7px 0 #7a4500, 0 10px 20px rgba(200,112,0,0.45), inset 0 1px 0 rgba(255,255,210,0.5);
  border:2px solid #d09000;
}
.arcade-btn-gold:active { box-shadow:0 2px 0 #7a4500; }

/* teal demo button */
.arcade-btn-teal {
  background:linear-gradient(180deg,#60ecd4 0%,#28c0a0 45%,#149880 100%);
  box-shadow: 0 7px 0 #0a5848, 0 10px 24px rgba(20,152,128,0.45), inset 0 1px 0 rgba(180,255,240,0.4);
  border:2px solid #18b090;
}
.arcade-btn-teal:hover { box-shadow:0 7px 0 #0a5848,0 14px 36px rgba(20,200,160,0.6),inset 0 1px 0 rgba(180,255,240,0.4); }
.arcade-btn-teal:active { box-shadow:0 2px 0 #0a5848,0 4px 10px rgba(20,152,128,0.25); }

.uct-badge {
  display:inline-block; background:rgba(255,255,255,0.25);
  border-radius:8px; padding:2px 9px; font-size:15px; margin-left:6px; vertical-align:middle;
}

#sphere-error {
  display:none; color:#ffb3b3; font-size:12px; line-height:1.5;
  background:rgba(255,60,60,0.14); border:1px solid rgba(255,80,80,0.3);
  border-radius:12px; padding:9px 14px; margin-top:12px;
  font-family:'Nunito',sans-serif; max-width:300px; margin-left:auto; margin-right:auto;
}

/* ── GAME SCREEN ── */
#game-screen {
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
#hud {
  position:absolute;top:13px;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 16px;pointer-events:none;z-index:20;
}
.hpill {
  background:rgba(255,255,255,0.07);backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.12);border-radius:22px;
  padding:6px 14px;font-size:13px;font-weight:500;
  color:rgba(255,255,255,0.82);display:flex;align-items:center;gap:7px;
}
.hlives{letter-spacing:5px;color:#ffb3c8;}
.haddr{color:#c8b4ff;font-size:11px;font-family:monospace;}

/* game over overlay inside game screen */
#game-overlay {
  position:absolute;z-index:30;top:0;left:0;right:0;bottom:0;
  display:none;align-items:center;justify-content:center;
  background:rgba(7,9,26,0.75);backdrop-filter:blur(10px);
}
.ov {
  background:rgba(255,255,255,0.07);backdrop-filter:blur(32px);
  border:1px solid rgba(255,255,255,0.17);border-radius:26px;
  padding:36px 40px;text-align:center;max-width:310px;
}
.ov-ico{font-size:44px;margin-bottom:10px;}
.ov-ttl{font-size:23px;font-weight:700;margin-bottom:4px;}
.ov-sub{font-size:13px;color:rgba(255,255,255,0.42);margin-bottom:18px;}
.ov-sc{font-size:50px;font-weight:800;color:#cdb8ff;letter-spacing:-1px;margin-bottom:2px;}
.ov-scl{font-size:12px;color:rgba(255,255,255,0.32);margin-bottom:22px;}
.ov-btns{display:flex;gap:10px;justify-content:center;}
.btn-ag{padding:12px 22px;border-radius:13px;border:none;background:linear-gradient(135deg,#c0a0ff,#6ba0ff);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.18s;}
.btn-ag:hover{opacity:0.88;}
.btn-bk{padding:12px 18px;border-radius:13px;border:1px solid rgba(255,255,255,0.13);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.46);font-size:14px;cursor:pointer;}
.btn-bk:hover{background:rgba(255,255,255,0.09);}

#gameCanvas{display:block;background:transparent;position:relative;z-index:10;}
#hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,0.18);pointer-events:none;z-index:15;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.18);border-top-color:#fff;border-radius:50%;animation:spin 0.65s linear infinite;display:inline-block;vertical-align:middle;margin-right:7px;}
</style>
</head>

<script>
/* ════════════════════════════════════════
   SOUND ENGINE (Web Audio API — no files needed)
════════════════════════════════════════ */
const SFX = (() => {
  let ctx = null;
  let menuTimeout = null;
  let menuStarted = false;
  let menuNodes = [];
  let muted = false;
  let lastTier = 0;
  let onMenu = true; // track whether we're on menu or in-game

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function play(fn){ if(!muted) fn(); }

  // ── JUMP ──
  function jump() { play(()=>{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(260,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(640,c.currentTime+0.13);
    g.gain.setValueAtTime(0.25,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
    o.start();o.stop(c.currentTime+0.2);
  });}

  // ── DOUBLE JUMP — sparkly ──
  function doubleJump() { play(()=>{
    const c=getCtx();
    [480,720,960].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=freq;
      const t=c.currentTime+i*0.04;
      g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
      o.start(t);o.stop(t+0.15);
    });
  });}

  // ── COIN ──
  function coin() { play(()=>{
    const c=getCtx();
    [880,1100,1320,1760].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=freq;
      const t=c.currentTime+i*0.055;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.13,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
      o.start(t);o.stop(t+0.18);
    });
  });}

  // ── LAND on platform ──
  function land() { play(()=>{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(130,c.currentTime);o.frequency.exponentialRampToValueAtTime(42,c.currentTime+0.09);
    g.gain.setValueAtTime(0.14,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.11);
    o.start();o.stop(c.currentTime+0.11);
  });}

  // ── NEAR MISS whoosh ──
  function whoosh() { play(()=>{
    const c=getCtx();
    // white noise burst via buffer
    const buf=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
    src.buffer=buf;f.type='bandpass';f.frequency.value=1200;f.Q.value=0.6;
    src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
    src.start();src.stop(c.currentTime+0.25);
  });}

  // ── HIT / LIFE LOST ──
  function hit() { play(()=>{
    const c=getCtx();
    // crunch
    const buf=c.createBuffer(1,c.sampleRate*0.18,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=c.createBufferSource(),g0=c.createGain();
    src.buffer=buf;src.connect(g0);g0.connect(c.destination);g0.gain.value=0.35;src.start();
    // low thud
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(35,c.currentTime+0.28);
    g.gain.setValueAtTime(0.4,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.28);
    o.start();o.stop(c.currentTime+0.28);
  });}

  // ── SPEED UP tier sting ──
  function speedUp(tier) { play(()=>{
    const c=getCtx();
    const sets=[[330,440,550],[440,550,660,880],[550,660,880,1100,1320]];
    const freqs=sets[Math.min(tier-1,2)]||[440];
    freqs.forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=freq;
      const t=c.currentTime+i*0.05;
      g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.start(t);o.stop(t+0.24);
    });
    // extra noise swoosh for MAX tier
    if(tier>=3){
      const buf=c.createBuffer(1,c.sampleRate*0.4,c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length*0.6);
      const src=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
      src.buffer=buf;f.type='highpass';f.frequency.value=2000;
      src.connect(f);f.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(0.15,c.currentTime+0.1);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);
      src.start(c.currentTime+0.1);src.stop(c.currentTime+0.5);
    }
  });}

  // ── GAME OVER — dramatic descend ──
  function gameOver() { play(()=>{
    const c=getCtx();
    [{f:523,t:0,d:0.4},{f:440,t:0.16,d:0.4},{f:349,t:0.32,d:0.5},{f:262,t:0.48,d:0.6},{f:196,t:0.64,d:1.1}].forEach(n=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=n.f;
      const t=c.currentTime+n.t;
      g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+n.d);
      o.start(t);o.stop(t+n.d+0.05);
    });
    // final deep boom
    const o2=c.createOscillator(),g2=c.createGain();
    o2.connect(g2);g2.connect(c.destination);o2.type='sine';o2.frequency.value=60;
    g2.gain.setValueAtTime(0.5,c.currentTime+0.7);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.8);
    o2.start(c.currentTime+0.7);o2.stop(c.currentTime+1.8);
  });}

    if(!val) stopMenuMusic(); // guarantee music stops when game starts
  }

  function toggleMute(){
    muted=!muted;
    if(menuAudioEl) menuAudioEl.volume = muted ? 0 : 0.7;
    menuNodes.forEach(n=>{ try{ n.g.gain.value=muted?0:n.baseGain; }catch(e){} });
    return muted;
  }

  function checkSpeedTier(score){
    const tier=score<400?0:score<1500?1:score<3500?2:3;
    if(tier>lastTier){ lastTier=tier; speedUp(tier); }
  }
  function resetTier(){ lastTier=0; }

  return { jump, doubleJump, coin, land, whoosh, hit, gameOver, speedUp,
           startMenuMusic, stopMenuMusic, setOnMenu, toggleMute,
           checkSpeedTier, resetTier, isMuted:()=>muted };
})();

// Get today's date range (UTC)
function todayRange(){
  const now = new Date();
  const start = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  const end   = new Date(start.getTime() + 86400000);
  return { start: start.toISOString(), end: end.toISOString() };
}

async function submitScore(player, score){
  if(!player || score <= 0) return;
  try {
    await fetch(`${SB_URL}/rest/v1/scores`, {
      method: 'POST',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ player, score })
    });
  } catch(e){ console.warn('Score submit failed', e); }
}

async function fetchTodayScores(){
  const { start, end } = todayRange();
  const res = await fetch(
    `${SB_URL}/rest/v1/scores?select=player,score,created_at&created_at=gte.${start}&created_at=lt.${end}&order=score.desc&limit=20`,
    { headers: SB_HDR }
  );
  return res.ok ? await res.json() : [];
}

// Keep only best score per player for today, top 5
function dedupe(rows){
  const map = {};
  rows.forEach(r => { if(!map[r.player] || r.score > map[r.player]) map[r.player] = r.score; });
  return Object.entries(map).map(([player,score])=>({player,score})).sort((a,b)=>b.score-a.score).slice(0,5);
}

function renderLB(rows, highlightPlayer){
  if(!rows.length) return `
    <div style="text-align:center;padding:60px 20px 40px;">

    </div>`;

  // Layout: #1 big center, #2 left, #3 right on top row; #4 #5 on bottom row
  const ordered = rows.slice(0,5);
  // Build card HTML
  function card(r, i, big){
    const cfg = RANKS[i];
    const isYou = r.player === highlightPlayer;
    const w = big ? 148 : 118;
    return `<div style="
      display:inline-block;vertical-align:bottom;
      width:${w}px;margin:0 6px;
      position:relative;text-align:center;
    ">
      <div style="position:relative;z-index:2;margin-bottom:-2px;line-height:0;">
        ${charSVG(i, (r.player.replace('@','')[0]||'?').toUpperCase())}
      </div>
      <div style="
        background:linear-gradient(180deg,${cfg.cardTop} 0%,${cfg.cardBg} 100%);
        border-radius:16px;
        border:${isYou?'2px solid rgba(255,255,255,0.6)':'1.5px solid rgba(255,255,255,0.1)'};
        padding:8px 10px 14px;
        position:relative;
      ">
        ${isYou?`<div style="position:absolute;top:6px;right:8px;background:rgba(255,255,255,0.15);border-radius:6px;padding:2px 7px;font-size:10px;font-family:'Nunito',sans-serif;font-weight:800;color:rgba(255,255,255,0.8);letter-spacing:1px;">YOU</div>`:''}
        <div style="font-family:'Fredoka One',sans-serif;font-size:9px;letter-spacing:2px;color:${cfg.scorCol};opacity:0.7;margin-bottom:2px;">${cfg.title}</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:800;font-size:${big?'15px':'13px'};color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;">${r.player}</div>
        <div style="font-family:'Fredoka One',sans-serif;font-size:${big?'22px':'18px'};color:${cfg.scorCol};line-height:1;">${r.score.toLocaleString()}</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;margin-top:1px;">PTS</div>
      </div>
    </div>`;
  }

  let html = '';
  // Top row — #2, #1 (big), #3
  html += `<div style="display:flex;justify-content:center;align-items:flex-end;margin-bottom:12px;">`;
  if(ordered[1]) html += card(ordered[1], 1, false);
  html += card(ordered[0], 0, true);
  if(ordered[2]) html += card(ordered[2], 2, false);
  html += `</div>`;
  // Bottom row — #4, #5
  if(ordered[3]||ordered[4]){
    html += `<div style="display:flex;justify-content:center;align-items:flex-end;">`;
    if(ordered[3]) html += card(ordered[3], 3, false);
    if(ordered[4]) html += card(ordered[4], 4, false);
    html += `</div>`;
  }
  return html;
}

(function(){
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');
  const PAL=['#9b6dff','#6b9eff','#ff8fc0','#70e8d4','#ffbf69','#c4b0ff'];
  let orbs=[];
  function resize(){
    c.width=innerWidth;c.height=innerHeight;orbs=[];
    PAL.forEach(col=>orbs.push({x:Math.random()*c.width,y:Math.random()*c.height,r:150+Math.random()*200,vx:(Math.random()-0.5)*0.22,vy:(Math.random()-0.5)*0.22,col,a:0.065+Math.random()*0.075}));
  }
  const STARS=Array.from({length:130},(_,i)=>({x:(Math.sin(i*127.1)*0.5+0.5),y:(Math.cos(i*311.7)*0.5+0.5),r:0.35+((i*73)%3)*0.38,a:0.3+((i*37)%10)*0.07}));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle='#07091a';ctx.fillRect(0,0,c.width,c.height);
    STARS.forEach(s=>{ctx.globalAlpha=s.a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();});
    orbs.forEach(o=>{
      o.x+=o.vx;o.y+=o.vy;
      if(o.x<-o.r||o.x>c.width+o.r)o.vx*=-1;
      if(o.y<-o.r||o.y>c.height+o.r)o.vy*=-1;
      const rgb=parseInt(o.col.slice(1,3),16)+','+parseInt(o.col.slice(3,5),16)+','+parseInt(o.col.slice(5,7),16);
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,`rgba(${rgb},${o.a})`);g.addColorStop(1,`rgba(${rgb},0)`);
      ctx.globalAlpha=1;ctx.fillStyle=g;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();

function spd(sc){
  if(sc<400)  return 2.4+(sc/400)*0.8;   // starts faster
  if(sc<1500) return 3.2+((sc-400)/1100)*1.8;
  if(sc<3500) return 5.0+((sc-1500)/2000)*1.8;
  return Math.min(SPD_MAX,6.8+((sc-3500)/1000)*2.2);
}
function obInt(sc){
  if(sc<400)  return 155;
  if(sc<1500) return Math.round(155-((sc-400)/1100)*50);
  if(sc<3500) return Math.round(105-((sc-1500)/2000)*35);
  return Math.max(52,Math.round(70-((sc-3500)/800)*18));
}

  } else if(t<0.82 && sc>800){
    // energy ball — fast, small
    S.obstacles.push({x:W+20,y:120+sr()*340,w:18,h:18,type:'ball',spin:0,pulse:0});
  } else {
    // spike wall — thin tall barrier with gap in middle
    const gapY=CEIL+50+sr()*200,gapH=130+sr()*40;
    S.obstacles.push({x:W+14,y:CEIL,w:14,h:gapY-CEIL,type:'spike',spin:0});
    S.obstacles.push({x:W+14,y:gapY+gapH,w:14,h:H-gapY-gapH,type:'spike',spin:0});
  }
}
function spawnCoin(){ S.coins.push({x:W+20,y:100+sr()*360,r:6,collected:false,bob:sr()*Math.PI*2}); }
function burst(x,y,col,n){ for(let i=0;i<n;i++) S.particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-1.5,life:1,col,r:1.5+Math.random()*2.5}); }
function overlaps(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

function update(){
  if(S.dead)return;
  const p=S.p; S.frame++; S.score++;
  S.speed=spd(S.score);
  SFX.checkSpeedTier(S.score);
  if(S.inv>0)S.inv--;
  p.vy+=GRAV;
  p.y+=p.vy;
  if(p.y<CEIL){p.y=CEIL;p.vy=Math.abs(p.vy)*0.25;p.jumps=0;}
  const v=S.speed;
  S.platforms.forEach(pf=>{if(!pf.fixed)pf.x-=v;});
  S.obstacles.forEach(o=>{
    o.x-=v*1.08;
    if(o.type==='ufo'){o.y+=o.vy;if(o.y<CEIL+10||o.y>H-60)o.vy*=-1;}
    if(o.type==='ball'){o.pulse=(o.pulse||0)+0.18;}
  });
  S.coins.forEach(c=>{c.x-=v;});
  S.platforms[0].x=0;
  if(S.platforms[S.platforms.length-1].x<W-90)spawnPF();
  S.obTimer++; if(S.obTimer>=obInt(S.score)){S.obTimer=0;spawnOb();}
  S.coinTimer++; if(S.coinTimer>=85){S.coinTimer=0;spawnCoin();}
  const wasGround=p.ground;
  p.ground=false;
  S.platforms.forEach(pf=>{
    if(p.vy>=0&&p.x+p.w>pf.x+5&&p.x<pf.x+pf.w-5&&p.y+p.h>=pf.y&&p.y+p.h<=pf.y+pf.h+p.vy+2){
      p.y=pf.y-p.h;p.vy=0;p.ground=true;p.jumps=2;
    }
  });
  if(!wasGround&&p.ground) SFX.land();
  if(p.y>H+50){hit();return;}
  if(S.inv===0){
    const hb={x:p.x+6,y:p.y+6,w:p.w-12,h:p.h-10};
    for(const o of S.obstacles){
      const ob={x:o.x+3,y:o.y+3,w:o.w-6,h:o.h-6};
      if(overlaps(hb,ob)){hit();return;}
    }
    S.obstacles.forEach(o=>{
      if(o.x+o.w>p.x-30&&o.x+o.w<p.x-4&&Math.abs((o.y+o.h/2)-(p.y+p.h/2))<55){
        if(!o._whooshed){o._whooshed=true;SFX.whoosh();}
      }
    });
  }
  S.coins.forEach(c=>{
    if(!c.collected&&Math.hypot(p.x+p.w/2-c.x,p.y+p.h/2-c.y)<c.r+15){c.collected=true;S.score+=80;burst(c.x,c.y,'#ffe680',8);SFX.coin();}
  });
  S.particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life-=0.033;});
  S.particles=S.particles.filter(pt=>pt.life>0);
  S.platforms=S.platforms.filter(pf=>pf.fixed||pf.x+pf.w>-10);
  S.obstacles=S.obstacles.filter(o=>o.x+o.w>-40);
  S.coins=S.coins.filter(c=>c.x>-20);
  document.getElementById('hud-score').textContent=S.score;
}

function hit(){
  if(S.inv>0)return;
  S.lives--; burst(S.p.x+S.p.w/2,S.p.y+S.p.h/2,'#ffb3c8',16); updLives();
  SFX.hit();
  if(S.lives<=0){
    S.dead=true;
    SFX.gameOver();
    SFX.stopMenuMusic();
    const coins=Math.floor(S.score/100);
    const player = window.SphereWallet?.identity?.nametag || '';
    document.getElementById('ov-ico').textContent='💫';
    document.getElementById('ov-ttl').textContent='Game Over';
    document.getElementById('ov-sub').textContent=window.SphereWallet?.isConnected ? `You earned ${coins} UCT` : 'You ran out of lives';
    document.getElementById('ov-sc').textContent=S.score.toLocaleString();
    document.getElementById('ov-lb-peek').textContent='Submitting score...';
    document.getElementById('game-overlay').style.display='flex';
    // Submit to leaderboard then show rank
    if(player && S.score > 0){
      submitScore(player, S.score).then(async ()=>{
        const rows = dedupe(await fetchTodayScores());
        const rank = rows.findIndex(r=>r.player===player);
        const peek = document.getElementById('ov-lb-peek');
        if(rank >= 0){
          const cfg = RANKS[rank];
          peek.innerHTML = `You're <strong style="color:${cfg.color};">#${rank+1} ${cfg.title}</strong> today!`;
        } else {
          peek.textContent = 'Score saved!';
        }
      }).catch(()=>{ document.getElementById('ov-lb-peek').textContent=''; });
    } else {
      document.getElementById('ov-lb-peek').textContent='';
    }
    if(window.SphereWallet?.isConnected){
      window.SphereWallet.requestPayout(coins);
      window.SphereWallet.resetDeposit();
      window.SphereWallet.updateUI('gameover');
    }
    return;
  }
  S.inv=110;S.p.y=200;S.p.vy=0;
}

/* ── DRAW ── */
function drawBg(){
  cx.fillStyle='#07091a';cx.fillRect(0,0,W,H);
  [[110,170,85,'rgba(155,109,255,0.055)'],[320,260,70,'rgba(107,158,255,0.05)'],[195,460,60,'rgba(255,143,192,0.045)']].forEach(([nx,ny,nr,nc])=>{
    const g=cx.createRadialGradient(nx,ny,0,nx,ny,nr);g.addColorStop(0,nc);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.fillRect(0,0,W,H);
  });
  const cg=cx.createLinearGradient(0,0,0,CEIL+30);cg.addColorStop(0,'rgba(255,130,180,0.14)');cg.addColorStop(1,'transparent');cx.fillStyle=cg;cx.fillRect(0,0,W,CEIL+30);
  cx.save();cx.strokeStyle='rgba(255,140,185,0.38)';cx.lineWidth=1.2;cx.setLineDash([7,6]);cx.beginPath();cx.moveTo(0,CEIL);cx.lineTo(W,CEIL);cx.stroke();cx.setLineDash([]);cx.restore();
  const sv=S.speed||1.6,tier=sv<2.8?'EASY':sv<4.5?'NORMAL':sv<6.2?'FAST':'MAX',tc=sv<2.8?'#a8f0d0':sv<4.5?'#c8b8ff':sv<6.2?'#ffe680':'#ffb3c8';
  cx.fillStyle=tc;cx.globalAlpha=0.5;cx.font='500 10px system-ui';cx.textAlign='right';cx.fillText(tier,W-10,H-10);cx.globalAlpha=1;
}
function drawPFs(){
  S.platforms.forEach(pf=>{
    cx.fillStyle='#181c42';rr(cx,pf.x,pf.y,pf.w,pf.h,4);cx.fill();
    cx.fillStyle='#b8a4ff';cx.globalAlpha=0.75;rr(cx,pf.x,pf.y,pf.w,3,2);cx.fill();cx.globalAlpha=1;
  });
}
function drawObs(){
  S.obstacles.forEach(o=>{
    o.spin=(o.spin+0.032)%(Math.PI*2);cx.save();
    if(o.type==='laser'){
      const g=cx.createLinearGradient(o.x,o.y,o.x+o.w,o.y);g.addColorStop(0,'rgba(255,140,185,0)');g.addColorStop(0.5,'rgba(255,140,185,0.88)');g.addColorStop(1,'rgba(255,140,185,0)');
      cx.fillStyle=g;cx.globalAlpha=0.62+0.28*Math.sin(S.frame*0.11);cx.fillRect(o.x,o.y,o.w,o.h);
    } else if(o.type==='sat'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);cx.rotate(o.spin);
      cx.fillStyle='#c8d2e0';cx.fillRect(-o.w/2,-o.h/3,o.w,o.h*0.66);
      cx.fillStyle='#78c8e8';cx.globalAlpha=0.9;cx.fillRect(-o.w,-3.5,o.w*0.42,7);cx.fillRect(o.w*0.58,-3.5,o.w*0.42,7);
    } else if(o.type==='rock'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);cx.rotate(o.spin);cx.fillStyle='#9e8c7a';cx.beginPath();
      for(let i=0;i<7;i++){const a=(i/7)*Math.PI*2,r=o.w/2*(0.72+0.28*Math.sin(a*2.3+1.2));i?cx.lineTo(Math.cos(a)*r,Math.sin(a)*r):cx.moveTo(Math.cos(a)*r,Math.sin(a)*r);}
      cx.closePath();cx.fill();
    } else if(o.type==='ufo'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);
      // saucer body
      cx.fillStyle='#c0e0ff';cx.beginPath();cx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);cx.fill();
      // dome
      cx.fillStyle='rgba(160,220,255,0.7)';cx.beginPath();cx.ellipse(0,-o.h/2+2,o.w/4,o.h/2,0,Math.PI,Math.PI*2);cx.fill();
      // beam
      cx.fillStyle='rgba(180,255,180,0.22)';cx.beginPath();cx.moveTo(-10,o.h/2);cx.lineTo(10,o.h/2);cx.lineTo(18,o.h/2+28);cx.lineTo(-18,o.h/2+28);cx.closePath();cx.fill();
      // lights
      cx.globalAlpha=0.7+0.3*Math.sin(S.frame*0.18);
      cx.fillStyle='#ff4466';cx.beginPath();cx.arc(-o.w/3,0,3,0,Math.PI*2);cx.fill();
      cx.fillStyle='#44ff88';cx.beginPath();cx.arc(o.w/3,0,3,0,Math.PI*2);cx.fill();
    } else if(o.type==='ball'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);
      const pulse=0.85+0.15*Math.sin(o.pulse||0);
      const g=cx.createRadialGradient(0,0,0,0,0,o.w/2*pulse);
      g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#88ffee');g.addColorStop(0.7,'#00ccff');g.addColorStop(1,'rgba(0,100,255,0)');
      cx.fillStyle=g;cx.globalAlpha=0.9;cx.beginPath();cx.arc(0,0,o.w/2*pulse,0,Math.PI*2);cx.fill();
      // outer ring
      cx.strokeStyle='rgba(100,220,255,0.6)';cx.lineWidth=2;cx.beginPath();cx.arc(0,0,o.w/2*pulse+4,0,Math.PI*2);cx.stroke();
    } else if(o.type==='spike'){
      const g=cx.createLinearGradient(o.x,o.y,o.x+o.w,o.y);
      g.addColorStop(0,'rgba(255,80,80,0)');g.addColorStop(0.5,'rgba(255,60,60,0.9)');g.addColorStop(1,'rgba(255,80,80,0)');
      cx.fillStyle=g;cx.globalAlpha=0.8+0.2*Math.sin(S.frame*0.14);cx.fillRect(o.x,o.y,o.w,o.h);
      // teeth
      cx.fillStyle='rgba(255,120,120,0.6)';
      for(let i=0;i<Math.floor(o.h/16);i++){
        cx.beginPath();cx.moveTo(o.x,o.y+i*16);cx.lineTo(o.x+o.w,o.y+i*16+8);cx.lineTo(o.x,o.y+i*16+16);cx.closePath();cx.fill();
      }
    }
    cx.restore();
  });
}
function drawCoins(){
  S.coins.forEach(c=>{
    if(c.collected)return;c.bob+=0.055;const cy=c.y+Math.sin(c.bob)*4;
    const g=cx.createRadialGradient(c.x,cy,0,c.x,cy,c.r*2.6);g.addColorStop(0,'rgba(255,230,120,0.28)');g.addColorStop(1,'transparent');
    cx.fillStyle=g;cx.beginPath();cx.arc(c.x,cy,c.r*2.6,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ffe680';cx.beginPath();cx.arc(c.x,cy,c.r,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.48)';cx.beginPath();cx.arc(c.x-1.5,cy-2,c.r*0.3,0,Math.PI*2);cx.fill();
  });
}
function drawPlayer(){
  const p=S.p;if(S.inv>0&&Math.floor(S.inv/5)%2===0)return;
  const px=p.x+p.w/2,py=p.y+p.h/2;p.tf++;
  if(!p.ground&&p.vy<0){
    const fh=9+4*Math.sin(p.tf*0.45);
    const fg=cx.createLinearGradient(px,p.y+p.h,px,p.y+p.h+fh);
    fg.addColorStop(0,'rgba(255,255,255,0.88)');fg.addColorStop(0.5,'rgba(195,160,255,0.65)');fg.addColorStop(1,'transparent');
    cx.fillStyle=fg;cx.globalAlpha=0.82;cx.beginPath();cx.moveTo(px-5,p.y+p.h);cx.lineTo(px+5,p.y+p.h);cx.lineTo(px,p.y+p.h+fh);cx.closePath();cx.fill();cx.globalAlpha=1;
  }
  const gg=cx.createRadialGradient(px,py,0,px,py,p.w*1.3);gg.addColorStop(0,'rgba(185,155,255,0.28)');gg.addColorStop(1,'transparent');
  cx.fillStyle=gg;cx.beginPath();cx.arc(px,py,p.w*1.3,0,Math.PI*2);cx.fill();
  cx.fillStyle='#a78bfa';rr(cx,p.x,p.y,p.w,p.h,7);cx.fill();
  cx.fillStyle='rgba(175,220,255,0.72)';rr(cx,p.x+4,p.y+7,p.w-8,11,4);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.16)';rr(cx,p.x+4,p.y+3,9,6,3);cx.fill();
}
function drawParts(){
  S.particles.forEach(pt=>{cx.globalAlpha=pt.life;cx.fillStyle=pt.col;cx.beginPath();cx.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
}
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function loop(){ update();drawBg();drawPFs();drawCoins();drawObs();drawPlayer();drawParts(); animId=requestAnimationFrame(loop); }

/* ── INPUT ── */
function doJump(){
  const p=S.p;if(p.jumps>0&&!S.dead){
    if(p.jumps===2) SFX.jump(); else SFX.doubleJump();
    p.vy=p.jumps===2?JV:DJV;p.jumps--;burst(p.x+p.w/2,p.y+p.h,'#c4b0ff',5);
  }
}
document.addEventListener('keydown',e=>{
  if(!keys[e.code]&&['Space','ArrowUp','KeyW'].includes(e.code))doJump();
  keys[e.code]=true;
});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.getElementById('gameCanvas').addEventListener('click',doJump);
document.getElementById('gameCanvas').addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});

function toggleMuteBtn(){
  const muted=SFX.toggleMute();
  document.getElementById('mute-btn-menu').innerHTML=muted?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> OFF':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> ON';
  document.getElementById('mute-btn-game').innerHTML=muted
    ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
    :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
}

function updLives(){
  const l=S.lives;
  document.getElementById('hud-lives').textContent=('♥ ').repeat(Math.max(0,l)).trim()+' '+('♡ ').repeat(Math.max(0,3-l)).trim();
}

/* ── SCREEN MANAGEMENT ── */
function startGame(){
  SFX.setOnMenu(false); // hard-stops music, prevents restart
  SFX.resetTier();
  S=newState();
  document.getElementById('game-overlay').style.display='none';
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('hud-addr').textContent=
    window.SphereWallet?.identity?.nametag || 'DEMO';
  if(animId)cancelAnimationFrame(animId);
  updLives(); loop();
  if(window.SphereWallet?.isConnected) window.SphereWallet.updateUI('playing');
}

function goToMenu(){
  if(animId)cancelAnimationFrame(animId);
  document.getElementById('game-screen').style.display='none';
  document.getElementById('menu-screen').style.display='flex';
  document.getElementById('game-overlay').style.display='none';
  SFX.setOnMenu(true);
  SFX.startMenuMusic();
}

// Called by sphere-wallet.js when deposit is confirmed
window._onWalletReady = startGame;

// Game overlay buttons
document.getElementById('ov-play-again').onclick = function(){
  if(window.SphereWallet?.isConnected){
    window.SphereWallet.depositAndRestart();
  } else {
    goToMenu(); // no wallet = go back to menu
  }
};
document.getElementById('ov-menu').onclick = goToMenu;

// Init — only set up state, do NOT start loop until game actually starts
S=newState(); updLives();
</script>
