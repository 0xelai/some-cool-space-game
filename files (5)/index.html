<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Jumper</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap');

body { font-family:'Press Start 2P',monospace; overflow:hidden; height:100vh; background:#020510; color:#fff; }
#bg-canvas { position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none; }

/* ══ MENU SCREEN ══ */
#menu-screen {
  position:relative; z-index:10;
  width:100%; height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}

/* floating planets */
.deco { position:absolute; border-radius:50%; pointer-events:none; }
.deco-moon {
  width:150px; height:150px;
  background:radial-gradient(circle at 38% 35%, #d4f7a0 0%, #a8e060 35%, #78b830 70%, #558010 100%);
  box-shadow: inset -16px -16px 32px rgba(30,60,0,0.4), 0 0 60px rgba(120,184,48,0.25);
  top:4%; left:3%; animation: floatA 7s ease-in-out infinite;
}
.deco-moon::before,.deco-moon::after{content:'';position:absolute;border-radius:50%;background:rgba(40,80,0,0.3);}
.deco-moon::before{width:32px;height:26px;top:32px;left:26px;}
.deco-moon::after{width:20px;height:18px;top:66px;left:72px;}
.deco-saturn {
  width:90px;height:90px;
  background:radial-gradient(circle at 38% 35%, #c8dcff 0%, #8090d8 50%, #384878 100%);
  box-shadow:inset -10px -10px 22px rgba(0,10,60,0.45),0 0 40px rgba(100,130,220,0.2);
  bottom:10%;right:4%;animation:floatB 9s ease-in-out infinite;
}
.deco-saturn::before{content:'';position:absolute;width:140px;height:28px;border:8px solid rgba(180,200,255,0.28);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-22deg);}
.deco-red{width:52px;height:52px;background:radial-gradient(circle at 38% 35%,#ffb880 0%,#e06030 55%,#882010 100%);box-shadow:inset -6px -6px 14px rgba(80,10,0,0.4);top:15%;right:14%;animation:floatC 11s ease-in-out infinite;}
.deco-rock1{width:44px;height:38px;background:radial-gradient(circle at 40% 38%,#8a7e9a 0%,#5a4e6a 100%);border-radius:46% 54% 38% 62%/55% 45% 55% 45%;bottom:20%;left:4%;animation:orbitRock 18s linear infinite;}
.deco-rock2{width:26px;height:24px;background:radial-gradient(circle at 40% 38%,#9a8a7a 0%,#6a5a4a 100%);border-radius:54% 46% 62% 38%;top:55%;right:10%;animation:floatA 8s ease-in-out infinite reverse;}
.deco-rock3{width:18px;height:16px;background:radial-gradient(circle at 40% 38%,#7a8a9a 0%,#3a4a5a 100%);border-radius:50%;top:35%;left:8%;animation:floatC 13s ease-in-out infinite;}
.deco-orbit{width:20px;height:18px;background:radial-gradient(circle at 40% 38%,#b0a090 0%,#705040 100%);border-radius:50%;top:4%;left:3%;transform-origin:160px 160px;animation:orbit 12s linear infinite;}
@keyframes orbit{from{transform:rotate(0deg) translateX(120px) rotate(0deg)}to{transform:rotate(360deg) translateX(120px) rotate(-360deg)}}
@keyframes floatA{0%,100%{transform:translateY(0px) rotate(0deg)}50%{transform:translateY(-22px) rotate(5deg)}}
@keyframes floatB{0%,100%{transform:translateY(0px) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}
@keyframes floatC{0%,100%{transform:translateY(0px) rotate(6deg)}50%{transform:translateY(-12px) rotate(-6deg)}}
@keyframes orbitRock{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(30px,-20px) rotate(90deg)}50%{transform:translate(60px,0px) rotate(180deg)}75%{transform:translate(30px,20px) rotate(270deg)}100%{transform:translate(0,0) rotate(360deg)}}
.twinkle{position:absolute;border-radius:50%;background:#fff;pointer-events:none;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.1;transform:scale(0.3)}}

/* ── PIXEL TITLE ── */
.menu-card{position:relative;z-index:5;text-align:center;width:calc(100% - 32px);max-width:420px;}
.menu-title{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(28px,6vw,44px);
  line-height:1.3;letter-spacing:2px;
  color:#e8f4ff;
  text-shadow:0 4px 0 #0a1a6a,0 8px 0 rgba(10,30,120,0.5),0 0 30px rgba(100,160,255,0.8),0 0 60px rgba(60,120,255,0.4);
  margin-bottom:32px;
  image-rendering:pixelated;
}
.title-line2{display:block;color:#ffe87a;text-shadow:0 4px 0 #8a5000,0 8px 0 rgba(140,80,0,0.4),0 0 30px rgba(255,200,60,0.8),0 0 60px rgba(255,150,0,0.4);}

/* ── WALLET INFO ── */
#sphere-wallet-info{
  display:none;
  background:rgba(10,20,60,0.8);
  border:2px solid #2a4a9a;
  border-bottom:3px solid #1a3070;
  border-radius:8px;padding:10px 16px;margin-bottom:14px;
  font-size:10px;font-family:'Press Start 2P',monospace;
}
.wallet-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
#sphere-address{color:#7adcff;font-size:9px;}
#sphere-balance{color:rgba(255,255,255,0.45);font-size:9px;}
#sphere-disconnect-btn{
  display:none;
  background:#1a2a5a;border:2px solid #2a4a9a;border-bottom:3px solid #0a1a40;
  border-radius:6px;padding:4px 8px;font-size:8px;color:#7adcff;cursor:pointer;
  font-family:'Press Start 2P',monospace;
}
#sphere-connect-btn{display:block;}
#sphere-deposit-btn{display:none;}

/* ── PIXEL BUTTONS ── */
.wallet-section{margin-bottom:0;}
.arcade-btn{
  display:block;width:100%;max-width:300px;
  margin:0 auto 16px;
  padding:14px 24px;
  font-family:'Press Start 2P',monospace;
  font-size:14px;letter-spacing:1px;
  color:#fff;cursor:pointer;border:none;
  border-radius:10px;
  position:relative;
  image-rendering:pixelated;
  animation:btnBounce 2s ease-in-out infinite;
  transition:transform 0.08s,box-shadow 0.08s;
}
.arcade-btn:nth-child(2){animation-delay:0.35s;}
@keyframes btnBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.arcade-btn:hover{filter:brightness(1.15);animation-play-state:paused;transform:translateY(-3px);}
.arcade-btn:active{transform:translateY(4px)!important;animation-play-state:paused;}
.arcade-btn:disabled{opacity:0.4;cursor:not-allowed;animation:none;transform:none!important;}

/* gold — CONNECT / PLAY */
.arcade-btn-gold{
  background:linear-gradient(180deg,#ffe87a 0%,#f0c020 40%,#d09000 100%);
  color:#5a3000;text-shadow:0 1px 0 rgba(255,255,200,0.6);
  border:2px solid #f0b000;
  border-bottom:5px solid #8a5000;
  box-shadow:0 6px 0 #5a3000,0 8px 20px rgba(200,130,0,0.35),inset 0 1px 0 rgba(255,255,220,0.5);
}
.arcade-btn-gold:active{box-shadow:0 1px 0 #5a3000,inset 0 2px 4px rgba(0,0,0,0.2);}

/* teal demo */
.arcade-btn-teal{
  background:linear-gradient(180deg,#70f0d8 0%,#30c0a0 40%,#0a9070 100%);
  color:#003828;text-shadow:0 1px 0 rgba(180,255,240,0.5);
  border:2px solid #20c090;
  border-bottom:5px solid #065840;
  box-shadow:0 6px 0 #065840,0 8px 20px rgba(20,160,120,0.35),inset 0 1px 0 rgba(180,255,240,0.4);
}
.arcade-btn-teal:active{box-shadow:0 1px 0 #065840;}

.uct-badge{
  display:inline-block;background:rgba(0,0,0,0.2);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:4px;padding:2px 7px;font-size:11px;margin-left:6px;vertical-align:middle;
}
#sphere-error{
  display:none;color:#ff8888;font-size:9px;line-height:1.8;
  background:rgba(80,0,0,0.4);border:2px solid #aa2020;
  border-radius:8px;padding:10px;margin-top:12px;
  font-family:'Press Start 2P',monospace;max-width:300px;margin-left:auto;margin-right:auto;
}

/* mute button */
#mute-btn-menu{font-family:'Press Start 2P',monospace!important;font-size:9px!important;}

/* ── GAME SCREEN ── */
#game-screen{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
/* pixel HUD */
#hud{
  position:absolute;top:10px;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px;pointer-events:none;z-index:20;
}
.hpill{
  background:#0a1430;
  border:2px solid #1a3a80;
  border-bottom:3px solid #0a1a50;
  border-radius:6px;
  padding:6px 12px;font-size:10px;font-weight:500;
  color:#7adcff;display:flex;align-items:center;gap:6px;
  font-family:'Press Start 2P',monospace;
  box-shadow:0 3px 0 #050a1e,0 4px 12px rgba(0,0,0,0.4);
  image-rendering:pixelated;
}
.hlives{letter-spacing:4px;color:#ff8fb0;}
.haddr{color:#7adcff;font-size:8px;font-family:'Press Start 2P',monospace;}

/* ── PIXEL GAME OVER ── */
#game-overlay {
  position:absolute;z-index:30;top:0;left:0;right:0;bottom:0;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,8,0.88);
}
.ov {
  position:relative;
  width:calc(100% - 48px);
  max-width:310px;
  border-radius:12px;
  padding:32px 28px 28px;
  text-align:center;
  overflow:hidden;
  background:#060c28;
  border:3px solid #1a3a8a;
  border-bottom:5px solid #0a1a50;
  box-shadow:0 8px 0 #020610,0 12px 40px rgba(20,60,200,0.35),inset 0 1px 0 rgba(100,150,255,0.15);
}
/* scanline */
.ov::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;z-index:0;border-radius:10px;
}
.ov > *{position:relative;z-index:1;}
.ov-ttl{
  font-family:'Press Start 2P',monospace;
  font-size:14px;letter-spacing:2px;
  color:#e8f4ff;margin-bottom:14px;
  text-shadow:0 3px 0 #0a1a6a,0 0 20px rgba(100,160,255,0.5);
}
.ov-sub{min-height:0;font-size:0;margin:0;}
.ov-sc{
  font-family:'Press Start 2P',monospace;
  font-size:36px;color:#ffe87a;
  letter-spacing:0;line-height:1.1;
  text-shadow:0 4px 0 #7a4500,0 0 30px rgba(255,200,60,0.4);
}
.ov-scl{
  font-size:7px;color:#4a7aff;
  margin-top:6px;margin-bottom:18px;letter-spacing:3px;
  font-family:'Press Start 2P',monospace;
}
.ov-btns{display:flex;gap:10px;justify-content:center;margin-top:4px;}
.btn-ag{
  flex:1;padding:13px 0;border-radius:8px;border:none;
  background:linear-gradient(180deg,#9080e8 0%,#6050c0 45%,#3a2890 100%);
  border:2px solid #8070d0;border-bottom:4px solid #1a1050;
  box-shadow:0 5px 0 #0a0830,0 6px 16px rgba(80,60,200,0.35);
  color:#fff;font-size:10px;font-weight:800;cursor:pointer;
  font-family:'Press Start 2P',monospace;letter-spacing:1px;
  text-shadow:0 2px 0 #1a0860;
  transition:transform 0.08s,box-shadow 0.08s;
}
.btn-ag:hover{transform:translateY(-2px);}
.btn-ag:active{transform:translateY(3px)!important;box-shadow:0 1px 0 #0a0830;}
.btn-bk{
  flex:1;padding:13px 0;border-radius:8px;
  background:linear-gradient(180deg,#2a3a6a 0%,#1a2a50 45%,#0a1430 100%);
  border:2px solid #1a2a5a;border-bottom:4px solid #060c20;
  box-shadow:0 5px 0 #020610,0 6px 12px rgba(0,0,0,0.4);
  color:#7adcff;font-size:10px;cursor:pointer;
  font-family:'Press Start 2P',monospace;letter-spacing:1px;
  transition:transform 0.08s;
}
.btn-bk:hover{transform:translateY(-1px);}
.btn-bk:active{transform:translateY(3px)!important;}
#ov-waiting{
  display:none;margin-top:14px;
  background:#0a1428;
  border:2px solid #c8a020;border-bottom:3px solid #6a5000;
  border-radius:8px;padding:10px 12px;
  font-size:8px;color:#ffe87a;
  font-family:'Press Start 2P',monospace;line-height:1.8;
  box-shadow:0 3px 0 #3a2800;
  animation:waitPulse 1.4s ease-in-out infinite;
}
@keyframes waitPulse{0%,100%{opacity:1}50%{opacity:0.45}}

#gameCanvas{display:block;background:transparent;position:relative;z-index:10;}
#hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:8px;color:rgba(100,150,255,0.35);pointer-events:none;z-index:15;font-family:'Press Start 2P',monospace;letter-spacing:1px;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- ══ MENU SCREEN ══ -->
<div id="menu-screen">

  <!-- LEADERBOARD BUTTON — top right -->
  <button onclick="openLeaderboard()" style="position:absolute;top:16px;right:16px;z-index:20;
    background:linear-gradient(180deg,#9080e8 0%,#6050c0 45%,#3a2890 100%);
    border:2px solid #8070d0;border-bottom:4px solid #1a1050;
    border-radius:8px;padding:10px 14px;
    color:#fff;font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;
    cursor:pointer;
    box-shadow:0 5px 0 #0a0830,0 6px 16px rgba(80,60,180,0.4);
    display:flex;align-items:center;gap:7px;transition:transform 0.08s;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    RANKS
  </button>

  <!-- floating planets & rocks -->
  <div class="deco deco-moon"></div>
  <div class="deco deco-orbit"></div>
  <div class="deco deco-saturn"></div>
  <div class="deco deco-red"></div>
  <div class="deco deco-rock1"></div>
  <div class="deco deco-rock2"></div>
  <div class="deco deco-rock3"></div>

  <!-- twinkling stars -->
  <div class="twinkle" style="width:4px;height:4px;top:10%;left:20%;animation-duration:1.8s;animation-delay:0s;"></div>
  <div class="twinkle" style="width:5px;height:5px;top:22%;left:52%;animation-duration:2.4s;animation-delay:0.4s;"></div>
  <div class="twinkle" style="width:3px;height:3px;top:55%;left:72%;animation-duration:1.6s;animation-delay:0.9s;"></div>
  <div class="twinkle" style="width:5px;height:5px;top:68%;left:28%;animation-duration:2.8s;animation-delay:1.3s;"></div>
  <div class="twinkle" style="width:4px;height:4px;top:38%;left:85%;animation-duration:2.0s;animation-delay:0.6s;"></div>
  <div class="twinkle" style="width:6px;height:6px;top:78%;left:46%;animation-duration:3.2s;animation-delay:1.8s;"></div>
  <div class="twinkle" style="width:3px;height:3px;top:6%;left:68%;animation-duration:1.9s;animation-delay:1.1s;"></div>
  <div class="twinkle" style="width:5px;height:5px;top:46%;left:11%;animation-duration:2.6s;animation-delay:2.2s;"></div>
  <div class="twinkle" style="width:4px;height:4px;top:84%;left:80%;animation-duration:2.1s;animation-delay:0.3s;"></div>
  <div class="twinkle" style="width:6px;height:6px;top:30%;left:94%;animation-duration:2.9s;animation-delay:1.5s;"></div>
  <div class="twinkle" style="width:3px;height:3px;top:90%;left:15%;animation-duration:1.7s;animation-delay:2.8s;"></div>
  <div class="twinkle" style="width:5px;height:5px;top:72%;left:60%;animation-duration:2.3s;animation-delay:0.7s;"></div>

  <div class="menu-card">
    <h1 class="menu-title">SPACE<span class="title-line2">JUMPER</span></h1>

    <div id="sphere-wallet-info">
      <div class="wallet-row">
        <span id="sphere-address">—</span>
        <span id="sphere-balance">—</span>
        <button id="sphere-disconnect-btn">Disconnect</button>
      </div>
    </div>

    <div class="wallet-section">
      <button id="sphere-connect-btn" class="arcade-btn arcade-btn-gold">CONNECT WALLET</button>
      <button id="sphere-deposit-btn" class="arcade-btn arcade-btn-gold">PLAY <span class="uct-badge">10 UCT</span></button>
    </div>

    <div id="sphere-error"></div>

    <button id="mute-btn-menu" onclick="toggleMuteBtn()" style="margin-top:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:8px 18px;color:rgba(255,255,255,0.55);font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;letter-spacing:0.05em;display:inline-flex;align-items:center;gap:7px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      MUTE
    </button>
  </div>
</div>

<!-- ══ LEADERBOARD MODAL ══ -->
<div id="lb-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,8,0.92);align-items:center;justify-content:center;">
  <div style="
    position:relative;width:calc(100% - 24px);max-width:500px;max-height:92vh;overflow-y:auto;
    background:#060c28;
    border:3px solid #1a3a8a;
    border-bottom:5px solid #0a1a50;
    border-radius:12px;
    box-shadow:0 8px 0 #030810,0 12px 40px rgba(20,60,180,0.4),inset 0 1px 0 rgba(100,150,255,0.2);
    padding:32px 24px 28px;
  ">
    <!-- scanline overlay -->
    <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;border-radius:10px;z-index:0;"></div>

    <div style="text-align:center;margin-bottom:24px;position:relative;z-index:1;">
      <div style="font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:4px;color:#4a7aff;margin-bottom:10px;" id="lb-date">—</div>
      <div style="font-family:'Press Start 2P',monospace;font-size:20px;letter-spacing:2px;color:#e8f4ff;text-shadow:0 3px 0 #0a1a6a,0 0 20px rgba(100,160,255,0.6);">HALL OF FAME</div>
      <div style="font-size:9px;color:rgba(100,150,255,0.5);margin-top:10px;font-family:'Press Start 2P',monospace;letter-spacing:1px;">TOP 5 PILOTS</div>
      <div style="margin:16px auto 0;width:55%;height:2px;background:linear-gradient(90deg,transparent,#1a3a8a,transparent);"></div>
    </div>

    <div id="lb-list" style="position:relative;z-index:1;"></div>

    <div style="text-align:center;margin-top:20px;position:relative;z-index:1;">
      <button onclick="closeLeaderboard()" style="
        background:linear-gradient(180deg,#3a4a8a 0%,#1a2a6a 45%,#0a1440 100%);
        border:2px solid #2a3a7a;border-bottom:4px solid #060c28;
        border-radius:8px;padding:12px 32px;
        color:#7adcff;font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:1px;
        cursor:pointer;
        box-shadow:0 5px 0 #020610,0 6px 16px rgba(20,60,180,0.3);
        transition:transform 0.08s;
      ">CLOSE</button>
    </div>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game-screen">
  <div id="hud">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="hpill"><span style="color:rgba(255,255,255,0.32);font-size:11px;">SCORE&nbsp;</span><span id="hud-score">0</span></div>
    </div>
    <div class="hpill" style="flex-direction:column;gap:1px;padding:5px 12px;">
      <span style="font-size:10px;color:rgba(255,255,255,0.28);">Sphere</span>
      <span class="haddr" id="hud-addr">—</span>
    </div>
    <div class="hpill hlives" id="hud-lives">♥ ♥ ♥</div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="game-overlay">
    <div class="ov">
      <div class="ov-ttl" id="ov-ttl">GAME OVER</div>
      <div class="ov-sub" id="ov-sub"></div>
      <div class="ov-sc" id="ov-sc">0</div>
      <div class="ov-scl">FINAL SCORE</div>
      <div id="ov-lb-peek" style="margin:6px 0 16px;font-size:13px;color:rgba(255,255,255,0.5);min-height:18px;font-family:'Nunito',sans-serif;font-weight:700;"></div>
      <div class="ov-btns">
        <button class="btn-ag" id="ov-play-again">PLAY AGAIN</button>
        <button class="btn-bk" id="ov-menu">MENU</button>
      </div>
      <div id="ov-waiting">Open Sphere wallet and confirm 10 UCT to play again</div>
    </div>
  </div>
  <div id="hint">SPACE / tap to jump · double jump available</div>
</div>

<!-- Load wallet FIRST -->
<script src="sphere-wallet.js"></script>

<script>
/* ════════════════════════════════════════
   SOUND ENGINE (Web Audio API — no files needed)
════════════════════════════════════════ */
const SFX = (() => {
  let ctx = null;
  let menuTimeout = null;
  let menuStarted = false;
  let menuNodes = [];
  let muted = sessionStorage.getItem('sj-muted') !== 'false'; // default muted unless user explicitly turned on
  let lastTier = 0;
  let onMenu = true; // track whether we're on menu or in-game

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function play(fn){ if(!muted) fn(); }

  // ── JUMP ──
  function jump() { play(()=>{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(260,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(640,c.currentTime+0.13);
    g.gain.setValueAtTime(0.25,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
    o.start();o.stop(c.currentTime+0.2);
  });}

  // ── DOUBLE JUMP — sparkly ──
  function doubleJump() { play(()=>{
    const c=getCtx();
    [480,720,960].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=freq;
      const t=c.currentTime+i*0.04;
      g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
      o.start(t);o.stop(t+0.15);
    });
  });}

  // ── COIN ──
  function coin() { play(()=>{
    const c=getCtx();
    [880,1100,1320,1760].forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=freq;
      const t=c.currentTime+i*0.055;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.13,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
      o.start(t);o.stop(t+0.18);
    });
  });}

  // ── LAND on platform ──
  function land() { play(()=>{
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(130,c.currentTime);o.frequency.exponentialRampToValueAtTime(42,c.currentTime+0.09);
    g.gain.setValueAtTime(0.14,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.11);
    o.start();o.stop(c.currentTime+0.11);
  });}

  // ── NEAR MISS whoosh ──
  function whoosh() { play(()=>{
    const c=getCtx();
    // white noise burst via buffer
    const buf=c.createBuffer(1,c.sampleRate*0.25,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
    src.buffer=buf;f.type='bandpass';f.frequency.value=1200;f.Q.value=0.6;
    src.connect(f);f.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
    src.start();src.stop(c.currentTime+0.25);
  });}

  // ── HIT / LIFE LOST ──
  function hit() { play(()=>{
    const c=getCtx();
    // crunch
    const buf=c.createBuffer(1,c.sampleRate*0.18,c.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const src=c.createBufferSource(),g0=c.createGain();
    src.buffer=buf;src.connect(g0);g0.connect(c.destination);g0.gain.value=0.35;src.start();
    // low thud
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(200,c.currentTime);o.frequency.exponentialRampToValueAtTime(35,c.currentTime+0.28);
    g.gain.setValueAtTime(0.4,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.28);
    o.start();o.stop(c.currentTime+0.28);
  });}

  // ── SPEED UP tier sting ──
  function speedUp(tier) { play(()=>{
    const c=getCtx();
    const sets=[[330,440,550],[440,550,660,880],[550,660,880,1100,1320]];
    const freqs=sets[Math.min(tier-1,2)]||[440];
    freqs.forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=freq;
      const t=c.currentTime+i*0.05;
      g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.start(t);o.stop(t+0.24);
    });
    // extra noise swoosh for MAX tier
    if(tier>=3){
      const buf=c.createBuffer(1,c.sampleRate*0.4,c.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length*0.6);
      const src=c.createBufferSource(),f=c.createBiquadFilter(),g=c.createGain();
      src.buffer=buf;f.type='highpass';f.frequency.value=2000;
      src.connect(f);f.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(0.15,c.currentTime+0.1);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);
      src.start(c.currentTime+0.1);src.stop(c.currentTime+0.5);
    }
  });}

  // ── GAME OVER — dramatic descend ──
  function gameOver() { play(()=>{
    const c=getCtx();
    [{f:523,t:0,d:0.4},{f:440,t:0.16,d:0.4},{f:349,t:0.32,d:0.5},{f:262,t:0.48,d:0.6},{f:196,t:0.64,d:1.1}].forEach(n=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=n.f;
      const t=c.currentTime+n.t;
      g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+n.d);
      o.start(t);o.stop(t+n.d+0.05);
    });
    // final deep boom
    const o2=c.createOscillator(),g2=c.createGain();
    o2.connect(g2);g2.connect(c.destination);o2.type='sine';o2.frequency.value=60;
    g2.gain.setValueAtTime(0.5,c.currentTime+0.7);g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+1.8);
    o2.start(c.currentTime+0.7);o2.stop(c.currentTime+1.8);
  });}

  // ── MENU MUSIC (synth — only when onMenu=true) ──
  function startMenuMusic() {
    if(menuStarted || !onMenu || muted) return;
    menuStarted = true;
    const c = getCtx();
    const nodes = [];
    function osc(type, freq, gainVal, dest){
      const o=c.createOscillator(), g=c.createGain();
      o.type=type; o.frequency.value=freq; g.gain.value=gainVal;
      o.connect(g); g.connect(dest||c.destination);
      o.start(); nodes.push({o,g,baseGain:gainVal});
      return {o,g};
    }
    const filter=c.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=320; filter.connect(c.destination);
    osc('sawtooth',55,0.06,filter);
    osc('sine',27.5,0.07);
    const lfo=c.createOscillator(), lg=c.createGain();
    const pad=c.createOscillator(), pg=c.createGain();
    lfo.frequency.value=0.28; lg.gain.value=9;
    pad.type='triangle'; pad.frequency.value=110; pg.gain.value=0.045;
    lfo.connect(lg); lg.connect(pad.frequency); pad.connect(pg); pg.connect(c.destination);
    lfo.start(); pad.start();
    nodes.push({o:lfo,g:lg,baseGain:9},{o:pad,g:pg,baseGain:0.045});
    menuNodes = nodes;
    const mel=[220,277,330,370,330,277,247,220,196,220,247,277];
    let step=0;
    function note(){
      if(!menuStarted||!onMenu||muted) return;
      const c2=getCtx(),o=c2.createOscillator(),g=c2.createGain();
      o.connect(g); g.connect(c2.destination); o.type='sine'; o.frequency.value=mel[step%mel.length];
      const now=c2.currentTime;
      g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(0.07,now+0.1); g.gain.exponentialRampToValueAtTime(0.001,now+1.3);
      o.start(now); o.stop(now+1.4);
      step++;
      menuTimeout=setTimeout(note,720);
    }
    note();
  }

  function stopMenuMusic(){
    menuStarted=false;
    clearTimeout(menuTimeout);
    menuNodes.forEach(n=>{ try{ n.o.stop(); }catch(e){} });
    menuNodes=[];
  }



  function toggleMute(){
    muted=!muted;
    sessionStorage.setItem('sj-muted', String(muted));
    menuNodes.forEach(n=>{ try{ n.g.gain.value=muted?0:n.baseGain; }catch(e){} });
    if(!muted && onMenu) startMenuMusic();
    if(muted) stopMenuMusic();
    return muted;
  }

  function setOnMenu(val){
    onMenu=val;
    if(!val){
      stopMenuMusic();
    } else {
      // Returning to menu — if user had sound on, restart music
      if(!muted) startMenuMusic();
    }
  }

  function checkSpeedTier(score){
    const tier=score<400?0:score<1500?1:score<3500?2:3;
    if(tier>lastTier){ lastTier=tier; speedUp(tier); }
  }
  function resetTier(){ lastTier=0; }

  // ── BUBBLE POP — soft airy ──
  function bubble() { play(()=>{
    if(Math.random()>0.25) return; // only fire 25% to avoid spam
    const c=getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    const f=600+Math.random()*400;
    o.frequency.setValueAtTime(f,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(f*1.4,c.currentTime+0.06);
    g.gain.setValueAtTime(0.04,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
    o.start();o.stop(c.currentTime+0.1);
  });}

  return { jump, doubleJump, coin, land, whoosh, hit, gameOver, speedUp, bubble,
           startMenuMusic, stopMenuMusic, setOnMenu, toggleMute,
           checkSpeedTier, resetTier, isMuted:()=>muted };
})();

// Get today's date range (UTC)
function todayRange(){
  const now = new Date();
  const start = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  const end   = new Date(start.getTime() + 86400000);
  return { start: start.toISOString(), end: end.toISOString() };
}

async function submitScore(player, score){
  if(!player || score <= 0) return;
  try {
    await fetch(`${SB_URL}/rest/v1/scores`, {
      method: 'POST',
      headers: { ...SB_HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ player, score })
    });
  } catch(e){ console.warn('Score submit failed', e); }
}

async function fetchTodayScores(){
  const { start, end } = todayRange();
  const res = await fetch(
    `${SB_URL}/rest/v1/scores?select=player,score,created_at&created_at=gte.${start}&created_at=lt.${end}&order=score.desc&limit=20`,
    { headers: SB_HDR }
  );
  return res.ok ? await res.json() : [];
}

// Keep only best score per player for today, top 5
function dedupe(rows){
  const map = {};
  rows.forEach(r => { if(!map[r.player] || r.score > map[r.player]) map[r.player] = r.score; });
  return Object.entries(map).map(([player,score])=>({player,score})).sort((a,b)=>b.score-a.score).slice(0,5);
}

    </div>`;

  // Layout: #1 big center, #2 left, #3 right on top row; #4 #5 on bottom row
  const ordered = rows.slice(0,5);
  // Build card HTML
  function card(r, i, big){
    const cfg = RANKS[i];
    const isYou = r.player === highlightPlayer;
    const w = big ? 148 : 118;
    return `<div style="
      display:inline-block;vertical-align:bottom;
      width:${w}px;margin:0 5px;
      position:relative;text-align:center;
    ">
      <div style="position:relative;z-index:2;margin-bottom:-2px;line-height:0;">

      </div>
      <div style="
        background:#060c28;
        border:2px solid #1a3a8a;
        border-bottom:${big?'4px':'3px'} solid #0a1a50;
        border-radius:10px;
        box-shadow:0 ${big?'5':'3'}px 0 #020610,0 6px 20px rgba(20,60,180,0.25);
        padding:10px 10px 14px;
        position:relative;overflow:hidden;
      ">
        <!-- scanline -->
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;border-radius:8px;"></div>
        ${isYou?`<div style="position:absolute;top:5px;right:6px;background:#1a3a8a;border:1px solid #4a7aff;border-radius:4px;padding:2px 5px;font-size:7px;font-family:'Press Start 2P',monospace;color:#7adcff;letter-spacing:1px;">YOU</div>`:''}

        <div style="font-family:'Press Start 2P',monospace;font-weight:800;font-size:${big?'9px':'8px'};color:#e8f4ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px;position:relative;">${r.player}</div>
        <div style="font-family:'Press Start 2P',monospace;font-size:${big?'16px':'13px'};color:#ffe87a;line-height:1;position:relative;text-shadow:0 2px 0 #8a5000;">${r.score.toLocaleString()}</div>
        <div style="font-size:7px;color:rgba(100,150,255,0.5);letter-spacing:2px;margin-top:4px;position:relative;font-family:'Press Start 2P',monospace;">PTS</div>
      </div>
    </div>`;
  }

  let html = '';
  // Top row — #2, #1 (big), #3
  html += `<div style="display:flex;justify-content:center;align-items:flex-end;margin-bottom:12px;">`;
  if(ordered[1]) html += card(ordered[1], 1, false);
  html += card(ordered[0], 0, true);
  if(ordered[2]) html += card(ordered[2], 2, false);
  html += `</div>`;
  // Bottom row — #4, #5
  if(ordered[3]||ordered[4]){
    html += `<div style="display:flex;justify-content:center;align-items:flex-end;">`;
    if(ordered[3]) html += card(ordered[3], 3, false);
    if(ordered[4]) html += card(ordered[4], 4, false);
    html += `</div>`;
  }
  return html;
}

(function(){
  const c=document.getElementById('bg-canvas'),ctx=c.getContext('2d');

  // Dense star field
  let stars=[], nebulas=[];
  function resize(){
    c.width=innerWidth;c.height=innerHeight;
    stars=[];
    // 400 stars of varying sizes
    for(let i=0;i<400;i++){
      stars.push({
        x:Math.random()*c.width,
        y:Math.random()*c.height,
        r:Math.random()<0.05?1.8+Math.random()*1.2:Math.random()<0.2?0.8+Math.random()*0.6:0.2+Math.random()*0.4,
        a:0.4+Math.random()*0.6,
        twinkleSpeed:0.004+Math.random()*0.012,
        twinkleOffset:Math.random()*Math.PI*2,
        col:Math.random()<0.1?'#b0d0ff':Math.random()<0.05?'#ffd080':'#ffffff'
      });
    }
    // Nebula blobs
    nebulas=[
      {x:c.width*0.15,y:c.height*0.25,r:280,col:'#3a0060',a:0.18},
      {x:c.width*0.75,y:c.height*0.15,r:220,col:'#001a60',a:0.22},
      {x:c.width*0.5, y:c.height*0.6, r:340,col:'#200040',a:0.16},
      {x:c.width*0.85,y:c.height*0.7, r:200,col:'#003040',a:0.20},
      {x:c.width*0.3, y:c.height*0.8, r:180,col:'#400020',a:0.14},
      {x:c.width*0.9, y:c.height*0.4, r:160,col:'#1a0050',a:0.18},
    ];
  }

  let frame=0;
  function draw(){
    frame++;
    ctx.clearRect(0,0,c.width,c.height);
    // Deep space background
    ctx.fillStyle='#020510';ctx.fillRect(0,0,c.width,c.height);

    // Nebula clouds
    nebulas.forEach(n=>{
      const r=parseInt(n.col.slice(1,3),16),gr=parseInt(n.col.slice(3,5),16),b=parseInt(n.col.slice(5,7),16);
      const g2=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g2.addColorStop(0,`rgba(${r},${gr},${b},${n.a})`);
      g2.addColorStop(0.5,`rgba(${r},${gr},${b},${n.a*0.4})`);
      g2.addColorStop(1,`rgba(${r},${gr},${b},0)`);
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    });

    // Stars with twinkle
    stars.forEach(s=>{
      const twinkle=0.5+0.5*Math.sin(frame*s.twinkleSpeed+s.twinkleOffset);
      ctx.globalAlpha=s.a*twinkle;
      ctx.fillStyle=s.col;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
      // Cross sparkle on bigger stars
      if(s.r>1.2){
        ctx.globalAlpha=s.a*twinkle*0.4;
        ctx.strokeStyle=s.col;ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(s.x-s.r*3,s.y);ctx.lineTo(s.x+s.r*3,s.y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(s.x,s.y-s.r*3);ctx.lineTo(s.x,s.y+s.r*3);ctx.stroke();
      }
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();draw();
})();

const CV=document.getElementById('gameCanvas'),cx=CV.getContext('2d');
const W=460,H=620; CV.width=W; CV.height=H;
function scl(){ const s=Math.min(innerWidth/W,innerHeight/H); CV.style.width=W*s+'px'; CV.style.height=H*s+'px'; }
window.addEventListener('resize',scl); scl();

const GRAV=0.40,JV=-10.0,DJV=-9.2,CEIL=58,PFH=13,SPD_MAX=9.0;
function spd(sc){
  if(sc<400)  return 2.4+(sc/400)*0.8;   // starts faster
  if(sc<1500) return 3.2+((sc-400)/1100)*1.8;
  if(sc<3500) return 5.0+((sc-1500)/2000)*1.8;
  return Math.min(SPD_MAX,6.8+((sc-3500)/1000)*2.2);
}
function obInt(sc){
  if(sc<400)  return 155;
  if(sc<1500) return Math.round(155-((sc-400)/1100)*50);
  if(sc<3500) return Math.round(105-((sc-1500)/2000)*35);
  return Math.max(52,Math.round(70-((sc-3500)/800)*18));
}

let S={},animId=null,keys={};

function newState(){
  return{
    p:{x:88,y:330,vy:0,w:22,h:52,ground:false,jumps:2,tf:0},
    platforms:[{x:0,y:505,w:W,h:16,fixed:true},{x:40,y:400,w:130,h:PFH,fixed:false},{x:230,y:320,w:105,h:PFH,fixed:false},{x:370,y:230,w:100,h:PFH,fixed:false}],
    obstacles:[],coins:[],particles:[],
    score:0,lives:3,frame:0,speed:1.6,dead:false,inv:0,obTimer:0,coinTimer:0,
    seed:Math.floor(Math.random()*0xffffff),
  };
}
function sr(){ S.seed=(S.seed*1664525+1013904223)&0xffffffff; return(S.seed>>>0)/0xffffffff; }

function spawnPF(){
  const last=S.platforms[S.platforms.length-1];
  const ny=Math.max(CEIL+50,Math.min(470,(last?last.y:320)+(sr()-0.5)*130));
  S.platforms.push({x:W+20,y:ny,w:88+sr()*90,h:PFH,fixed:false});
}
function spawnOb(){
  const t=sr(), sc=S.score;
  // Ground level = ~470, floor platform = 505
  const GROUND=462, MID=300, HIGH_Y=CEIL+50;

  if(t<0.18){
    // rock — deliberately 50/50 high OR ground level
    const high=sr()<0.5,ow=26+sr()*22,oh=26+sr()*22;
    S.obstacles.push({x:W+20,y:high?HIGH_Y+sr()*70:GROUND-oh+sr()*30,w:ow,h:oh,type:'rock',spin:0});
  } else if(t<0.33){
    // satellite — high or sitting on ground level
    const high=sr()<0.5,ow=30+sr()*18,oh=24+sr()*14;
    S.obstacles.push({x:W+20,y:high?HIGH_Y+sr()*60:GROUND-oh+sr()*20,w:ow,h:oh,type:'sat',spin:0});
  } else if(t<0.46){
    // laser pillar — from top OR from floor (always 50/50)
    const fromTop=sr()<0.5,bh=90+sr()*100;
    S.obstacles.push({x:W+18,y:fromTop?CEIL:H-30-bh,w:11,h:bh,type:'laser',spin:0});
  } else if(t<0.55){
    // UFO — mid screen, moves up/down
    S.obstacles.push({x:W+20,y:MID-30+sr()*120,w:44,h:22,type:'ufo',spin:0,vy:1.4*(sr()<0.5?1:-1)});
  } else if(t<0.63){
    // double rock — one high, one ground — FORCES a jump
    const topY=HIGH_Y+sr()*60;
    S.obstacles.push({x:W+20,y:topY,w:22,h:22,type:'rock',spin:0});
    S.obstacles.push({x:W+20,y:GROUND-22+sr()*15,w:22,h:22,type:'rock',spin:sr()*Math.PI*2});
  } else if(t<0.74){
    // ground scraper — wide flat rock that forces a jump
    const ow=32+sr()*28, oh=20+sr()*16;
    S.obstacles.push({x:W+20,y:GROUND-oh,w:ow,h:oh,type:'rock',spin:0});
  } else if(t<0.84 && sc>500){
    // energy ball — mix of heights including ground
    const atGround=sr()<0.4;
    S.obstacles.push({x:W+20,y:atGround?GROUND-18:HIGH_Y+sr()*260,w:18,h:18,type:'ball',spin:0,pulse:0});
  } else if(t<0.91 && sc>600){
    // comet — low diagonal aimed at ground huggers
    const low=sr()<0.5;
    S.obstacles.push({x:W+20,y:low?GROUND-40+sr()*30:HIGH_Y+sr()*150,w:28,h:12,type:'comet',spin:0,vy:(sr()-0.5)*1.8});
  } else {
    // wormhole — spread across all heights including ground
    S.obstacles.push({x:W+20,y:HIGH_Y+sr()*320,w:32,h:32,type:'wormhole',spin:0});
  }
}
function spawnCoin(){ S.coins.push({x:W+20,y:100+sr()*360,r:6,collected:false,bob:sr()*Math.PI*2}); }
function burst(x,y,col,n){ for(let i=0;i<n;i++) S.particles.push({x,y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5-1.5,life:1,col,r:1.5+Math.random()*2.5}); }
function overlaps(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

function update(){
  if(S.dead)return;
  const p=S.p; S.frame++; S.score++;
  S.speed=spd(S.score);
  SFX.checkSpeedTier(S.score);
  if(S.inv>0)S.inv--;
  p.vy+=GRAV;
  p.y+=p.vy;
  if(p.y<CEIL){p.y=CEIL;p.vy=Math.abs(p.vy)*0.25;p.jumps=0;}
  const v=S.speed;
  S.platforms.forEach(pf=>{if(!pf.fixed)pf.x-=v;});
  S.obstacles.forEach(o=>{
    o.x-=v*1.08;
    if(o.type==='ufo'){o.y+=o.vy;if(o.y<CEIL+10||o.y>H-60)o.vy*=-1;}
    if(o.type==='ball'){o.pulse=(o.pulse||0)+0.18;}
    if(o.type==='comet'){o.y+=(o.vy||0);if(o.y<CEIL+5||o.y>H-40){o.vy=(o.vy||0)*-1;}}
    if(o.type==='wormhole'){o.spin=(o.spin+0.04)%(Math.PI*2);}
  });
  S.coins.forEach(c=>{c.x-=v;});
  S.platforms[0].x=0;
  if(S.platforms[S.platforms.length-1].x<W-90)spawnPF();
  S.obTimer++; if(S.obTimer>=obInt(S.score)){S.obTimer=0;spawnOb();}
  S.coinTimer++; if(S.coinTimer>=85){S.coinTimer=0;spawnCoin();}
  const wasGround=p.ground;
  p.ground=false;
  S.platforms.forEach(pf=>{
    if(p.vy>=0&&p.x+p.w>pf.x+5&&p.x<pf.x+pf.w-5&&p.y+p.h>=pf.y&&p.y+p.h<=pf.y+pf.h+p.vy+2){
      p.y=pf.y-p.h;p.vy=0;p.ground=true;p.jumps=2;
    }
  });
  if(!wasGround&&p.ground) SFX.land();
  if(p.y>H+50){hit();return;}
  if(S.inv===0){
    const hb={x:p.x+6,y:p.y+6,w:p.w-12,h:p.h-10};
    for(const o of S.obstacles){
      const ob={x:o.x+3,y:o.y+3,w:o.w-6,h:o.h-6};
      if(overlaps(hb,ob)){hit();return;}
    }
    S.obstacles.forEach(o=>{
      if(o.x+o.w>p.x-30&&o.x+o.w<p.x-4&&Math.abs((o.y+o.h/2)-(p.y+p.h/2))<55){
        if(!o._whooshed){o._whooshed=true;SFX.whoosh();}
      }
    });
  }
  S.coins.forEach(c=>{
    if(!c.collected&&Math.hypot(p.x+p.w/2-c.x,p.y+p.h/2-c.y)<c.r+15){c.collected=true;S.score+=80;burst(c.x,c.y,'#ffe680',8);SFX.coin();}
  });
  S.particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life-=0.033;});
  S.particles=S.particles.filter(pt=>pt.life>0);
  S.platforms=S.platforms.filter(pf=>pf.fixed||pf.x+pf.w>-10);
  S.obstacles=S.obstacles.filter(o=>o.x+o.w>-40);
  S.coins=S.coins.filter(c=>c.x>-20);
  document.getElementById('hud-score').textContent=S.score;
}

function hit(){
  if(S.inv>0)return;
  S.lives--; burst(S.p.x+S.p.w/2,S.p.y+S.p.h/2,'#ffb3c8',16); updLives();
  SFX.hit();
  if(S.lives<=0){
    S.dead=true;
    SFX.gameOver();
    SFX.stopMenuMusic();
    const coins=Math.floor(S.score/100);
    const player = window.SphereWallet?.identity?.nametag || '';
    document.getElementById('ov-ttl').textContent='GAME OVER';
    document.getElementById('ov-sub').textContent='';
    document.getElementById('ov-sc').textContent=S.score.toLocaleString();
    document.getElementById('ov-lb-peek').textContent='Submitting score...';
    document.getElementById('game-overlay').style.display='flex';
    // Submit to leaderboard then show rank
    if(player && S.score > 0){
      submitScore(player, S.score).then(async ()=>{
        const rows = dedupe(await fetchTodayScores());
        const rank = rows.findIndex(r=>r.player===player);
        const peek = document.getElementById('ov-lb-peek');
        if(rank >= 0){
          const cfg = RANKS[rank];
          peek.innerHTML = `You're <strong style="color:${cfg.color};">#${rank+1} ${cfg.title}</strong> today!`;
        } else {
          peek.textContent = 'Score saved!';
        }
      }).catch(()=>{ document.getElementById('ov-lb-peek').textContent=''; });
    } else {
      document.getElementById('ov-lb-peek').textContent='';
    }
    if(window.SphereWallet?.isConnected){
      window.SphereWallet.requestPayout(coins);
      window.SphereWallet.resetDeposit();
      window.SphereWallet.updateUI('gameover');
    }
    return;
  }
  S.inv=110;S.p.y=200;S.p.vy=0;
}

function drawBg(){
  cx.fillStyle='#07091a';cx.fillRect(0,0,W,H);
  [[110,170,85,'rgba(155,109,255,0.055)'],[320,260,70,'rgba(107,158,255,0.05)'],[195,460,60,'rgba(255,143,192,0.045)']].forEach(([nx,ny,nr,nc])=>{

  });

  cx.save();cx.strokeStyle='rgba(255,140,185,0.38)';cx.lineWidth=1.2;cx.setLineDash([7,6]);cx.beginPath();cx.moveTo(0,CEIL);cx.lineTo(W,CEIL);cx.stroke();cx.setLineDash([]);cx.restore();
  const sv=S.speed||1.6,tier=sv<2.8?'EASY':sv<4.5?'NORMAL':sv<6.2?'FAST':'MAX',tc=sv<2.8?'#a8f0d0':sv<4.5?'#c8b8ff':sv<6.2?'#ffe680':'#ffb3c8';

function drawObs(){
  S.obstacles.forEach(o=>{
    o.spin=(o.spin+0.032)%(Math.PI*2);cx.save();
    if(o.type==='laser'){
      const g=cx.createLinearGradient(o.x,o.y,o.x+o.w,o.y);g.addColorStop(0,'rgba(255,140,185,0)');g.addColorStop(0.5,'rgba(255,140,185,0.88)');g.addColorStop(1,'rgba(255,140,185,0)');
      cx.fillStyle=g;cx.globalAlpha=0.62+0.28*Math.sin(S.frame*0.11);cx.fillRect(o.x,o.y,o.w,o.h);
    } else if(o.type==='sat'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);cx.rotate(o.spin);
      cx.fillStyle='#c8d2e0';cx.fillRect(-o.w/2,-o.h/3,o.w,o.h*0.66);
      cx.fillStyle='#78c8e8';cx.globalAlpha=0.9;cx.fillRect(-o.w,-3.5,o.w*0.42,7);cx.fillRect(o.w*0.58,-3.5,o.w*0.42,7);
    } else if(o.type==='rock'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);cx.rotate(o.spin);cx.fillStyle='#9e8c7a';cx.beginPath();
      for(let i=0;i<7;i++){const a=(i/7)*Math.PI*2,r=o.w/2*(0.72+0.28*Math.sin(a*2.3+1.2));i?cx.lineTo(Math.cos(a)*r,Math.sin(a)*r):cx.moveTo(Math.cos(a)*r,Math.sin(a)*r);}
      cx.closePath();cx.fill();
    } else if(o.type==='ufo'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);
      // saucer body
      cx.fillStyle='#c0e0ff';cx.beginPath();cx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);cx.fill();
      // dome
      cx.fillStyle='rgba(160,220,255,0.7)';cx.beginPath();cx.ellipse(0,-o.h/2+2,o.w/4,o.h/2,0,Math.PI,Math.PI*2);cx.fill();
      // beam
      cx.fillStyle='rgba(180,255,180,0.22)';cx.beginPath();cx.moveTo(-10,o.h/2);cx.lineTo(10,o.h/2);cx.lineTo(18,o.h/2+28);cx.lineTo(-18,o.h/2+28);cx.closePath();cx.fill();
      // lights
      cx.globalAlpha=0.7+0.3*Math.sin(S.frame*0.18);
      cx.fillStyle='#ff4466';cx.beginPath();cx.arc(-o.w/3,0,3,0,Math.PI*2);cx.fill();
      cx.fillStyle='#44ff88';cx.beginPath();cx.arc(o.w/3,0,3,0,Math.PI*2);cx.fill();
    } else if(o.type==='ball'){
      cx.translate(o.x+o.w/2,o.y+o.h/2);
      const pulse=0.85+0.15*Math.sin(o.pulse||0);
      const g=cx.createRadialGradient(0,0,0,0,0,o.w/2*pulse);
      g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#88ffee');g.addColorStop(0.7,'#00ccff');g.addColorStop(1,'rgba(0,100,255,0)');
      cx.fillStyle=g;cx.globalAlpha=0.9;cx.beginPath();cx.arc(0,0,o.w/2*pulse,0,Math.PI*2);cx.fill();
      // outer ring
      cx.strokeStyle='rgba(100,220,255,0.6)';cx.lineWidth=2;cx.beginPath();cx.arc(0,0,o.w/2*pulse+4,0,Math.PI*2);cx.stroke();
    } else if(o.type==='comet'){
      cx.save();cx.translate(o.x+o.w/2,o.y+o.h/2);
      // tail
      const tg=cx.createLinearGradient(-o.w,-o.h/4,0,0);
      tg.addColorStop(0,'transparent');tg.addColorStop(0.5,'rgba(180,230,255,0.4)');tg.addColorStop(1,'rgba(255,255,255,0.8)');
      cx.fillStyle=tg;cx.beginPath();cx.moveTo(-o.w,-o.h/3);cx.lineTo(0,0);cx.lineTo(-o.w,o.h/3);cx.closePath();cx.fill();
      // core
      const cg=cx.createRadialGradient(0,0,0,0,0,o.h/2);
      cg.addColorStop(0,'#ffffff');cg.addColorStop(0.4,'#a0e0ff');cg.addColorStop(1,'rgba(80,180,255,0)');
      cx.fillStyle=cg;cx.beginPath();cx.arc(0,0,o.h/2,0,Math.PI*2);cx.fill();
      cx.restore();
    } else if(o.type==='wormhole'){
      cx.save();cx.translate(o.x+o.w/2,o.y+o.h/2);cx.rotate(o.spin);
      const r=o.w/2;
      // outer rings
      for(let i=3;i>=0;i--){
        cx.globalAlpha=0.15+i*0.12;
        cx.strokeStyle=i%2===0?'#a060ff':'#40c0ff';
        cx.lineWidth=2+i*0.8;
        cx.beginPath();cx.arc(0,0,r-i*3,0,Math.PI*2);cx.stroke();
      }
      // dark core
      cx.globalAlpha=0.9;
      const wg=cx.createRadialGradient(0,0,0,0,0,r-6);
      wg.addColorStop(0,'#0a0020');wg.addColorStop(0.6,'#1a0040');wg.addColorStop(1,'rgba(80,0,120,0)');
      cx.fillStyle=wg;cx.beginPath();cx.arc(0,0,r-4,0,Math.PI*2);cx.fill();
      // inner shimmer
      cx.globalAlpha=0.5+0.3*Math.sin(S.frame*0.15);
      cx.strokeStyle='#c080ff';cx.lineWidth=1.5;
      cx.beginPath();cx.arc(0,0,4,0,Math.PI*2);cx.stroke();
      cx.restore();cx.globalAlpha=1;
      const g=cx.createLinearGradient(o.x,o.y,o.x+o.w,o.y);
      g.addColorStop(0,'rgba(255,80,80,0)');g.addColorStop(0.5,'rgba(255,60,60,0.9)');g.addColorStop(1,'rgba(255,80,80,0)');
      cx.fillStyle=g;cx.globalAlpha=0.8+0.2*Math.sin(S.frame*0.14);cx.fillRect(o.x,o.y,o.w,o.h);
      // teeth
      cx.fillStyle='rgba(255,120,120,0.6)';
      for(let i=0;i<Math.floor(o.h/16);i++){
        cx.beginPath();cx.moveTo(o.x,o.y+i*16);cx.lineTo(o.x+o.w,o.y+i*16+8);cx.lineTo(o.x,o.y+i*16+16);cx.closePath();cx.fill();
      }
    }
    cx.restore();
  });
}
function drawCoins(){
  S.coins.forEach(c=>{
    if(c.collected)return;c.bob+=0.055;const cy=c.y+Math.sin(c.bob)*4;
    const g=cx.createRadialGradient(c.x,cy,0,c.x,cy,c.r*2.6);g.addColorStop(0,'rgba(255,230,120,0.28)');g.addColorStop(1,'transparent');
    cx.fillStyle=g;cx.beginPath();cx.arc(c.x,cy,c.r*2.6,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ffe680';cx.beginPath();cx.arc(c.x,cy,c.r,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.48)';cx.beginPath();cx.arc(c.x-1.5,cy-2,c.r*0.3,0,Math.PI*2);cx.fill();
  });
}
/* ─── BUBBLES ─── */
let bubbles=[];
function spawnBubble(x,y){
  bubbles.push({x:x+(Math.random()-0.5)*18,y,r:2+Math.random()*4,vy:-0.6-Math.random()*0.8,life:1,wobble:Math.random()*Math.PI*2});
}
function updateBubbles(){
  bubbles.forEach(b=>{b.y+=b.vy;b.x+=Math.sin(b.wobble+=0.08)*0.5;b.life-=0.018;});
  bubbles=bubbles.filter(b=>b.life>0);
}
function drawBubbles(px,py){
  bubbles.forEach(b=>{
    cx.save();cx.globalAlpha=b.life*0.7;
    cx.strokeStyle='rgba(160,220,255,0.9)';cx.lineWidth=1;
    cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.stroke();
    cx.fillStyle='rgba(200,240,255,0.18)';cx.fill();
    // tiny shine
    cx.fillStyle='rgba(255,255,255,0.55)';cx.beginPath();cx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.25,0,Math.PI*2);cx.fill();
    cx.restore();
  });
}

function drawPlayer(){
  const p=S.p;
  if(S.inv>0&&Math.floor(S.inv/5)%2===0)return;
  const px=p.x+p.w/2;
  const py=p.y; // top of hitbox
  p.tf++;

  // spawn hoverboard bubbles every few frames
  if(S.frame%4===0) spawnBubble(px, py+p.h+6);
  if(S.frame%7===0) SFX.bubble&&SFX.bubble();
  updateBubbles();
  drawBubbles(px,py);

  // leg animation — running cycle
  const legSwing = p.ground ? Math.sin(p.tf*0.28)*10 : 0;
  const legSwing2 = p.ground ? Math.sin(p.tf*0.28+Math.PI)*10 : 0;

  cx.save();
  cx.translate(px, py);

  // ── HOVERBOARD ──
  const boardW=38, boardH=7, boardY=p.h+2;
  // board glow
  const bg=cx.createRadialGradient(0,boardY+4,0,0,boardY+4,22);
  bg.addColorStop(0,'rgba(80,200,255,0.35)');bg.addColorStop(1,'transparent');
  cx.fillStyle=bg;cx.beginPath();cx.ellipse(0,boardY+4,22,10,0,0,Math.PI*2);cx.fill();
  // board body
  cx.fillStyle='#2a3a5a';rr(cx,-boardW/2,boardY,boardW,boardH,4);cx.fill();
  cx.fillStyle='#3a5080';rr(cx,-boardW/2+2,boardY+1,boardW-4,3,2);cx.fill();
  // gold stripes on board
  cx.fillStyle='#c8a020';cx.fillRect(-boardW/2+4,boardY+boardH-2,8,2);
  cx.fillStyle='#c8a020';cx.fillRect(boardW/2-12,boardY+boardH-2,8,2);
  // engine glow jets
  cx.fillStyle='rgba(80,200,255,0.6)';cx.beginPath();cx.ellipse(-12,boardY+boardH,4,3,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(80,200,255,0.6)';cx.beginPath();cx.ellipse(12,boardY+boardH,4,3,0,0,Math.PI*2);cx.fill();

  // ── LEGS — long thin animated ──
  // left leg
  cx.strokeStyle='#3a8090';cx.lineWidth=5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-4,p.h-14);cx.lineTo(-4+legSwing,p.h-2);cx.stroke();
  // left foot
  cx.fillStyle='#2a5060';cx.beginPath();cx.ellipse(-4+legSwing,p.h-1,6,3,0,0,Math.PI*2);cx.fill();
  // gold ankle stripe
  cx.strokeStyle='#c8a020';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(-4+legSwing-5,p.h-4);cx.lineTo(-4+legSwing+5,p.h-4);cx.stroke();
  // right leg
  cx.strokeStyle='#3a8090';cx.lineWidth=5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(4,p.h-14);cx.lineTo(4+legSwing2,p.h-2);cx.stroke();
  // right foot
  cx.fillStyle='#2a5060';cx.beginPath();cx.ellipse(4+legSwing2,p.h-1,6,3,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#c8a020';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(4+legSwing2-5,p.h-4);cx.lineTo(4+legSwing2+5,p.h-4);cx.stroke();

  // ── BODY — slim blue flight suit ──
  // torso
  cx.fillStyle='#2e7090';cx.beginPath();
  cx.moveTo(-9,p.h-14);cx.lineTo(-10,p.h-34);cx.lineTo(10,p.h-34);cx.lineTo(9,p.h-14);cx.closePath();cx.fill();
  // gold stripes on torso sides
  cx.fillStyle='#c8a020';cx.fillRect(-11,p.h-32,2,18);cx.fillRect(9,p.h-32,2,18);
  // chest harness
  cx.strokeStyle='#1a3a50';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(-8,p.h-28);cx.lineTo(8,p.h-28);cx.stroke();
  cx.beginPath();cx.moveTo(-8,p.h-22);cx.lineTo(8,p.h-22);cx.stroke();
  cx.beginPath();cx.moveTo(0,p.h-28);cx.lineTo(0,p.h-22);cx.stroke();
  // collar
  cx.fillStyle='#1a4a60';cx.beginPath();cx.moveTo(-8,p.h-34);cx.lineTo(-6,p.h-38);cx.lineTo(6,p.h-38);cx.lineTo(8,p.h-34);cx.closePath();cx.fill();

  // ── LEFT ARM — holding bag ──
  const armSwing=p.ground?Math.sin(p.tf*0.28+Math.PI)*6:0;
  cx.strokeStyle='#2e7090';cx.lineWidth=4;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-9,p.h-32);cx.lineTo(-14,p.h-22+armSwing);cx.stroke();
  // bag
  const bagY=p.h-20+armSwing;
  cx.fillStyle='#888';rr(cx,-22,bagY,16,12,3);cx.fill();
  cx.fillStyle='#666';rr(cx,-22,bagY,16,5,3);cx.fill();
  cx.strokeStyle='#c8a020';cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(-22,bagY+8);cx.lineTo(-6,bagY+8);cx.stroke();
  cx.beginPath();cx.moveTo(-22,bagY+6);cx.lineTo(-6,bagY+6);cx.stroke();
  // bag handle
  cx.strokeStyle='#aaa';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(-18,bagY);cx.quadraticCurveTo(-14,bagY-5,-10,bagY);cx.stroke();

  // ── RIGHT ARM — slightly raised ──
  const armSwing2=p.ground?Math.sin(p.tf*0.28)*6:-8;
  cx.strokeStyle='#2e7090';cx.lineWidth=4;cx.lineCap='round';
  cx.beginPath();cx.moveTo(9,p.h-32);cx.lineTo(15,p.h-24+armSwing2);cx.stroke();
  // right glove
  cx.fillStyle='#1a4a60';cx.beginPath();cx.ellipse(16,p.h-22+armSwing2,5,4,0.3,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#c8a020';cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(11,p.h-25+armSwing2);cx.lineTo(19,p.h-25+armSwing2);cx.stroke();

  // ── HELMET — big white sphere ──
  const helmY=p.h-52;
  // neck tube
  cx.strokeStyle='#1a3a50';cx.lineWidth=5;
  cx.beginPath();cx.moveTo(-3,p.h-38);cx.quadraticCurveTo(-8,p.h-44,-5,helmY+12);cx.stroke();
  cx.strokeStyle='#2a5060';cx.lineWidth=2;
  cx.beginPath();cx.moveTo(-3,p.h-38);cx.quadraticCurveTo(-8,p.h-44,-5,helmY+12);cx.stroke();
  // helmet outer
  cx.fillStyle='#c8d8e8';cx.beginPath();cx.arc(0,helmY,14,0,Math.PI*2);cx.fill();
  cx.fillStyle='#dde8f4';cx.beginPath();cx.arc(0,helmY,12,0,Math.PI*2);cx.fill();
  // visor — dark
  cx.fillStyle='#0a1830';cx.beginPath();cx.ellipse(0,helmY,9,8,0,0,Math.PI*2);cx.fill();
  // visor tint
  cx.fillStyle='rgba(40,80,160,0.4)';cx.beginPath();cx.ellipse(0,helmY,9,8,0,0,Math.PI*2);cx.fill();
  // visor reflections
  cx.fillStyle='rgba(255,255,255,0.6)';cx.beginPath();cx.ellipse(-3,helmY-3,4,2.5,-0.4,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.25)';cx.beginPath();cx.ellipse(3,helmY+2,2,1.5,0.2,0,Math.PI*2);cx.fill();
  // helmet side connector
  cx.fillStyle='#3a5070';cx.beginPath();cx.arc(-12,helmY+2,3,0,Math.PI*2);cx.fill();
  // helmet top shine
  cx.fillStyle='rgba(255,255,255,0.45)';cx.beginPath();cx.ellipse(-2,helmY-8,5,3,-0.3,0,Math.PI*2);cx.fill();
  // helmet rim
  cx.strokeStyle='#a0b8cc';cx.lineWidth=1.5;cx.beginPath();cx.arc(0,helmY,14,0,Math.PI*2);cx.stroke();

  cx.restore();
}
function drawParts(){
  S.particles.forEach(pt=>{cx.globalAlpha=pt.life;cx.fillStyle=pt.col;cx.beginPath();cx.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
}
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function loop(){ update();drawBg();drawPFs();drawCoins();drawObs();drawPlayer();drawParts(); animId=requestAnimationFrame(loop); }

/* ── INPUT ── */
function doJump(){
  const p=S.p;if(p.jumps>0&&!S.dead){
    if(p.jumps===2) SFX.jump(); else SFX.doubleJump();
    p.vy=p.jumps===2?JV:DJV;p.jumps--;burst(p.x+p.w/2,p.y+p.h,'#c4b0ff',5);
  }
}
document.addEventListener('keydown',e=>{
  if(!keys[e.code]&&['Space','ArrowUp','KeyW'].includes(e.code))doJump();
  keys[e.code]=true;
});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.getElementById('gameCanvas').addEventListener('click',doJump);
document.getElementById('gameCanvas').addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});

function toggleMuteBtn(){
  const muted=SFX.toggleMute();
  const btn=document.getElementById('mute-btn-menu');
  if(muted){
    btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg> UNMUTE';
  } else {
    btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg> MUTE';
  }
}

function updLives(){
  const l=S.lives;
  document.getElementById('hud-lives').textContent=('♥ ').repeat(Math.max(0,l)).trim()+' '+('♡ ').repeat(Math.max(0,3-l)).trim();
}

/* ── SCREEN MANAGEMENT ── */
function startGame(){
  SFX.setOnMenu(false);
  SFX.resetTier();
  document.getElementById('ov-waiting').style.display='none';
  document.getElementById('ov-play-again').disabled=false;
  document.getElementById('ov-play-again').style.opacity='1';
  S=newState();
  document.getElementById('game-overlay').style.display='none';
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  document.getElementById('hud-addr').textContent=
    window.SphereWallet?.identity?.nametag || 'DEMO';
  if(animId)cancelAnimationFrame(animId);
  updLives(); loop();
  if(window.SphereWallet?.isConnected) window.SphereWallet.updateUI('playing');
}

function goToMenu(){
  if(animId)cancelAnimationFrame(animId);
  document.getElementById('game-screen').style.display='none';
  document.getElementById('menu-screen').style.display='flex';
  document.getElementById('game-overlay').style.display='none';
  SFX.setOnMenu(true);
  SFX.startMenuMusic();
}

// Called by sphere-wallet.js when deposit is confirmed
window._onWalletReady = startGame;

// Game overlay buttons
document.getElementById('ov-play-again').onclick = function(){
  if(window.SphereWallet?.isConnected){
    document.getElementById('ov-waiting').style.display='block';
    document.getElementById('ov-play-again').disabled=true;
    document.getElementById('ov-play-again').style.opacity='0.5';
    window.SphereWallet.depositAndRestart();
  } else {
    goToMenu();
  }
};
document.getElementById('ov-menu').onclick = goToMenu;

// Init — only set up state, do NOT start loop until game actually starts
S=newState(); updLives();

// Sync mute button to current state on load
(function(){
  const muted = SFX.isMuted();
  const menuBtn = document.getElementById('mute-btn-menu');
  const gameBtn = document.getElementById('mute-btn-game');
  const muteIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  const unmuteIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  if(muted){
    menuBtn.innerHTML = unmuteIcon + ' UNMUTE';
    gameBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  } else {
    menuBtn.innerHTML = muteIcon + ' MUTE';
    gameBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  }
})();
</script>
